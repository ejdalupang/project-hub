<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #f7f7f5;
  --sidebar-bg: #111318;
  --sidebar-border: #1e2128;
  --card-bg: #ffffff;
  --card-border: #ebebea;
  --text: #1a1a1a;
  --text-2: #555;
  --muted: #999;
  --accent: #6366f1;
  --proj-color: #6366f1;
  --done-bg: #edfcf2;   --done-text: #1a7a41;  --done-border: #b8f0cc;
  --ip-bg: #fff8e6;     --ip-text: #92640a;    --ip-border: #fde68a;
  --todo-bg: #f4f4f5;   --todo-text: #52525b;  --todo-border: #d4d4d8;
  --danger: #ef4444;
  --r: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
  font-size: 13px;
}

/* ── Sidebar ── */
#sidebar {
  width: 256px; min-width: 256px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  border-right: 1px solid var(--sidebar-border);
}
#sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}
#sidebar-logo {
  display: flex; align-items: center; gap: 8px;
}
#sidebar-logo-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
#sidebar-logo-text {
  font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: #f1f1f0;
}
#sidebar-logo-text em { color: #a5b4fc; font-style: normal; }
#sidebar-section-label {
  padding: 16px 18px 6px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: #3d4148;
  flex-shrink: 0;
}
#projects-list { flex: 1; overflow-y: auto; padding: 2px 8px 6px; }
.proj-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; cursor: pointer; border-radius: 8px;
  color: #6b7280; font-size: 13px; font-weight: 500;
  transition: background 0.12s, color 0.12s;
  user-select: none; position: relative; margin-bottom: 1px;
}
.proj-item:hover { background: #1e2128; color: #d1d5db; }
.proj-item.active { background: #1e2128; color: #f1f1f0; }
.proj-color-bar {
  width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0;
  transition: opacity 0.12s;
}
.proj-item:not(.active) .proj-color-bar { opacity: 0.5; }
.proj-info { flex: 1; min-width: 0; }
.proj-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.proj-progress-row {
  display: flex; align-items: center; gap: 6px; margin-top: 3px;
}
.proj-progress-bar {
  flex: 1; height: 3px; background: #2d3139; border-radius: 2px; overflow: hidden;
}
.proj-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.proj-count { font-size: 10px; color: #3d4148; white-space: nowrap; }
.proj-item.active .proj-count { color: #6b7280; }
.proj-item.active .proj-progress-bar { background: #2d3139; }
.proj-del {
  opacity: 0; background: none; border: none; color: #3d4148;
  cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 4px;
  transition: all 0.12s; flex-shrink: 0;
}
.proj-item:hover .proj-del { opacity: 1; }
.proj-del:hover { color: var(--danger); background: #2d1515; }
#add-proj {
  margin: 6px 8px 16px; padding: 8px 12px;
  background: transparent; border: 1px dashed #2d3139;
  border-radius: 8px; color: #3d4148;
  cursor: pointer; font-size: 12.5px; font-family: inherit; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.12s; width: calc(100% - 16px);
}
#add-proj:hover { background: #1e2128; color: #9ca3af; border-color: #3d4148; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

/* Project header */
#proj-header {
  padding: 20px 28px 0;
  background: var(--bg);
  flex-shrink: 0;
}
#proj-header-inner {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--card-border);
}
#proj-title-area { display: flex; align-items: center; gap: 12px; }
#proj-color-chip {
  width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
  background: var(--proj-color);
}
#proj-title {
  font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text);
}
#proj-stats {
  display: flex; align-items: center; gap: 6px; margin-top: 5px; margin-left: 26px;
}
.stat-chip {
  font-size: 11.5px; font-weight: 500; padding: 2px 8px;
  border-radius: 20px; background: white; border: 1px solid var(--card-border);
  color: var(--text-2);
}
#proj-header-right {
  display: flex; align-items: center; gap: 8px; padding-top: 2px;
}
#view-toggle {
  display: flex; background: white; border: 1px solid var(--card-border);
  border-radius: 8px; padding: 3px; gap: 2px;
}
.vbtn {
  padding: 5px 12px; border-radius: 6px; border: none;
  background: none; cursor: pointer; font-size: 12.5px;
  color: var(--muted); transition: all 0.12s; font-family: inherit; font-weight: 500;
  display: flex; align-items: center; gap: 5px;
}
.vbtn.active { background: var(--bg); color: var(--text); font-weight: 600; }
.vbtn:hover:not(.active) { color: var(--text-2); }
#add-task-btn {
  padding: 7px 16px;
  background: var(--proj-color);
  color: white; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: inherit;
  flex-shrink: 0; transition: opacity 0.12s, transform 0.1s;
  display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}
#add-task-btn:hover { opacity: 0.9; transform: translateY(-1px); }
#add-task-btn:active { transform: translateY(0); }

#save-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #10b981; opacity: 0; transition: opacity 0.3s; flex-shrink: 0;
}
#save-dot.show { opacity: 1; }

#content { flex: 1; overflow-y: auto; padding: 20px 28px 32px; }

/* ── Cards view ── */
#cards-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px; align-items: start;
}

/* ── Task card ── */
.task-card {
  background: var(--card-bg); border-radius: var(--r);
  box-shadow: var(--shadow-sm); padding: 0;
  border: 1px solid var(--card-border);
  transition: box-shadow 0.15s, transform 0.12s; position: relative;
  overflow: hidden;
}
.task-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.task-card:hover .del-btn { opacity: 1; }
.task-card-accent {
  height: 3px; background: var(--proj-color); width: 100%;
}
.task-card-body { padding: 14px 14px 12px; }

.del-btn {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--muted);
  cursor: pointer; opacity: 0; transition: all 0.12s;
  font-size: 12px; padding: 3px 5px; border-radius: 4px; z-index: 1;
}
.del-btn:hover { color: var(--danger); background: #fef2f2; }

.task-title {
  font-size: 13.5px; font-weight: 600; line-height: 1.45; color: var(--text);
  margin-bottom: 10px; padding-right: 20px;
  outline: none; min-height: 20px;
}
.task-title[contenteditable="true"]:empty::before {
  content: 'Task name…'; color: var(--muted); font-weight: 400;
}
.task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.sbadge {
  padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  user-select: none; transition: filter 0.12s; white-space: nowrap;
  border: 1px solid transparent; display: inline-flex; align-items: center; gap: 4px;
}
.sbadge:hover { filter: brightness(0.94); }
.s-done        { background: var(--done-bg); color: var(--done-text); border-color: var(--done-border); }
.s-in-progress { background: var(--ip-bg);   color: var(--ip-text);   border-color: var(--ip-border); }
.s-todo        { background: var(--todo-bg); color: var(--todo-text); border-color: var(--todo-border); }
.sbadge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

.due {
  font-size: 11.5px; color: var(--muted); cursor: pointer;
  padding: 3px 7px; border-radius: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  transition: background 0.12s, color 0.12s; position: relative;
  font-weight: 500;
}
.due:hover { background: var(--bg); color: var(--text-2); }
.due.overdue { color: var(--danger); background: #fff5f5; }
.due input[type="date"] {
  position: absolute; opacity: 0; pointer-events: none;
  width: 1px; height: 1px; top: 0; left: 0;
}

.task-notes {
  margin-top: 10px; width: 100%; background: none;
  border: none; outline: none; resize: none;
  font-size: 12px; color: var(--muted); font-family: inherit;
  line-height: 1.6; border-radius: 6px; padding: 4px 5px;
  transition: background 0.12s;
}
.task-notes::placeholder { color: #d1d5db; }
.task-notes:focus { background: var(--bg); color: var(--text-2); }

/* ── Kanban ── */
#kanban-view { display: flex; gap: 12px; align-items: flex-start; }
.k-col {
  flex: 1; min-width: 0; border-radius: var(--r); padding: 12px;
  background: #f0f0ee;
}
.k-col-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 0 2px;
}
.k-col-title { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; }
.k-count {
  font-size: 10.5px; background: white; color: var(--muted);
  padding: 1px 6px; border-radius: 10px; font-weight: 600;
  border: 1px solid var(--card-border);
}
.k-cards { display: flex; flex-direction: column; gap: 8px; }
.k-empty { font-size: 12px; color: var(--muted); padding: 16px 8px; text-align: center; }

/* ── Timeline ── */
#timeline-view { max-width: 600px; }
.tl-group { margin-bottom: 28px; }
.tl-date {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
}
.tl-date::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

/* ── Links ── */
.links-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--card-border); }
.links-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.links-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.link-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 8px; transition: background 0.12s;
}
.link-row:hover { background: white; box-shadow: var(--shadow-sm); }
.link-row:hover .del-btn { opacity: 1; }
.link-name {
  font-size: 13px; color: var(--accent); outline: none; flex: 1; min-width: 80px;
  font-weight: 500;
}
.link-name:focus { border-bottom: 1px solid var(--accent); }
.link-url { font-size: 11.5px; color: var(--muted); outline: none; flex: 2; min-width: 0; }
.link-url:empty::before { content: 'Paste URL…'; color: #d1d5db; }
.link-go {
  font-size: 12px; color: var(--accent); text-decoration: none;
  padding: 3px 6px; border-radius: 5px; opacity: 0; flex-shrink: 0;
  transition: opacity 0.12s; background: #eef2ff;
}
.link-row:hover .link-go { opacity: 1; }
.add-link-btn {
  background: none; border: 1px dashed var(--card-border);
  color: var(--muted); font-size: 12px; padding: 5px 12px;
  border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px; transition: all 0.12s;
}
.add-link-btn:hover { background: white; color: var(--text-2); border-color: var(--muted); box-shadow: var(--shadow-sm); }

/* ── Empty ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  grid-column: 1 / -1;
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; font-weight: 500; }
.empty-state small { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }

#no-project {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); text-align: center; padding: 40px;
}
#no-project .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
#no-project p { font-size: 15px; font-weight: 500; }
#no-project small { font-size: 13px; margin-top: 6px; display: block; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo">
      <div id="sidebar-logo-icon">◈</div>
      <div id="sidebar-logo-text">Project <em>Hub</em></div>
    </div>
  </div>
  <div id="sidebar-section-label">Projects</div>
  <div id="projects-list"></div>
  <button id="add-proj">＋ New Project</button>
</div>

<div id="main">
  <div id="proj-header" style="display:none">
    <div id="proj-header-inner">
      <div>
        <div id="proj-title-area">
          <div id="proj-color-chip"></div>
          <div id="proj-title"></div>
          <div id="save-dot"></div>
        </div>
        <div id="proj-stats"></div>
      </div>
      <div id="proj-header-right">
        <div id="view-toggle">
          <button class="vbtn active" data-view="cards">⊞ Cards</button>
          <button class="vbtn" data-view="kanban">⋮⋮ Kanban</button>
          <button class="vbtn" data-view="timeline">↕ Timeline</button>
        </div>
        <button id="add-task-btn">＋ Add Task</button>
      </div>
    </div>
  </div>
  <div id="content">
    <div id="no-project">
      <div class="icon">◈</div>
      <p>Select a project to get started</p>
      <small>Choose one from the sidebar or create a new one</small>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'project-hub-data';

const DEFAULT_DATA = {
  projects: [
    {
      id: 'p1', name: 'Building Blocks Sprint', color: '#6366f1',
      links: [{ id: 'l1', label: 'Designers Checklist', url: '' }],
      tasks: [
        { id: 't1', title: 'Setup Catchup with Jade', dueDate: '2026-02-02', status: 'done', notes: '' },
        { id: 't2', title: 'Prep 3 things to discuss for the meet', dueDate: '2026-02-03', status: 'done', notes: '' },
        { id: 't3', title: 'Review Sprint 1 Templates', dueDate: '2026-02-04', status: 'done', notes: '' },
        { id: 't4', title: 'Prep Kick-off Deck', dueDate: '2026-02-06', status: 'done', notes: '' },
        { id: 't5', title: 'Kick-off Meeting', dueDate: '2026-02-11', status: 'done', notes: '' },
        { id: 't6', title: "Create Reviewers and Designer's Checklist", dueDate: '2026-02-19', status: 'done', notes: '' }
      ]
    },
    {
      id: 'p2', name: 'Video Template Auditing (IBEX)', color: '#f59e0b',
      links: [
        { id: 'l1', label: 'Monday Board Process', url: '' },
        { id: 'l2', label: 'Ibex Doc Sync', url: '' }
      ],
      tasks: [
        { id: 't1', title: 'Review & audit video templates', dueDate: '2026-02-20', status: 'in-progress', notes: '' },
        { id: 't2', title: 'Weekly syncs (Mon–Thu)', dueDate: '2026-02-09', status: 'done', notes: 'Mon ✓, Tue ✓, Wed (N/A), Thu (N/A), Thu Prep Remit' },
        { id: 't3', title: 'Create agenda sheet for Mohid', dueDate: '2026-02-16', status: 'done', notes: '' }
      ]
    },
    { id: 'p3', name: 'Identifying Bugs and Resolution', color: '#ef4444', links: [], tasks: [] },
    { id: 'p4', name: 'Day to Day / Misc.', color: '#10b981', links: [], tasks: [] },
    { id: 'p5', name: 'Creator Template Audit Deck', color: '#8b5cf6', links: [], tasks: [] },
    {
      id: 'p6', name: 'CVA Talking Heads', color: '#06b6d4',
      links: [
        { id: 'l1', label: 'CVA Strat, Briefs, and Everything', url: '' },
        { id: 'l2', label: 'Canvagram IOs (Safari)', url: '' },
        { id: 'l3', label: 'Annotation Tool', url: '' }
      ],
      tasks: []
    },
    { id: 'p7', name: "Hackathon '26: Design Consistency Reviewer", color: '#f97316', links: [], tasks: [] },
    {
      id: 'p8', name: 'UGC Social Media Templates', color: '#ec4899',
      links: [{ id: 'l1', label: 'Visual Review Queue Tutorial', url: '' }],
      tasks: [{ id: 't1', title: 'Visual Review For Social UGC', dueDate: '2026-06-11', status: 'in-progress', notes: '' }]
    }
  ]
};

let S = { projects: [], activeId: null, view: 'cards' };
function uid() { return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,6); }

function load() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    S.projects = (stored ? JSON.parse(stored) : DEFAULT_DATA).projects || [];
  } catch { S.projects = DEFAULT_DATA.projects; }
  if (S.projects.length) S.activeId = S.projects[0].id;
}

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: S.projects }));
    const dot = document.getElementById('save-dot');
    dot.style.background = '#10b981'; dot.classList.add('show');
    setTimeout(() => dot.classList.remove('show'), 1200);
  }, 400);
}

const proj = () => S.projects.find(p => p.id === S.activeId);

const SL = { todo: 'To Do', 'in-progress': 'In Progress', done: 'Done' };
const SN = { todo: 'in-progress', 'in-progress': 'done', done: 'todo' };
const SC = { todo: 's-todo', 'in-progress': 's-in-progress', done: 's-done' };

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}
function isOverdue(d, s) { return d && s !== 'done' && new Date(d) < new Date(new Date().toDateString()); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function badge(status) {
  return `<span class="sbadge ${SC[status]}" data-a="status"><span class="sbadge-dot"></span>${SL[status]}</span>`;
}

function dueEl(task) {
  const ov = isOverdue(task.dueDate, task.status);
  return `<span class="due${ov ? ' overdue' : ''}" data-a="open-date">
    ${task.dueDate ? '📅 ' + fmtDate(task.dueDate) : '+ Date'}
    <input type="date" value="${task.dueDate || ''}" data-a="set-date">
  </span>`;
}

function cardHtml(task, slim = false) {
  const p = proj();
  return `<div class="task-card" data-tid="${task.id}">
    <div class="task-card-accent" style="background:${p?.color || 'var(--accent)'}"></div>
    <div class="task-card-body">
      <button class="del-btn" data-a="del-task">✕</button>
      <div class="task-title" contenteditable="true" data-a="title" spellcheck="false">${esc(task.title)}</div>
      <div class="task-meta">${badge(task.status)} ${dueEl(task)}</div>
      ${!slim ? `<textarea class="task-notes" placeholder="Add notes…" data-a="notes" rows="1">${esc(task.notes || '')}</textarea>` : ''}
    </div>
  </div>`;
}

function cardsView(p) {
  if (!p.tasks.length)
    return `<div id="cards-view"><div class="empty-state"><div class="icon">✦</div><p>No tasks yet</p><small>Hit "+ Add Task" above to get started</small></div></div>`;
  return `<div id="cards-view">${p.tasks.map(t => cardHtml(t)).join('')}</div>`;
}

function kanbanView(p) {
  return `<div id="kanban-view">${['todo','in-progress','done'].map(st => {
    const tasks = p.tasks.filter(t => t.status === st);
    return `<div class="k-col">
      <div class="k-col-head">
        <span class="sbadge ${SC[st]}" style="cursor:default"><span class="sbadge-dot"></span>${SL[st]}</span>
        <span class="k-count">${tasks.length}</span>
      </div>
      <div class="k-cards">${tasks.length
        ? tasks.map(t => cardHtml(t, true)).join('')
        : `<div class="k-empty">No tasks here</div>`
      }</div>
    </div>`;
  }).join('')}</div>`;
}

function timelineView(p) {
  if (!p.tasks.length)
    return `<div id="timeline-view"><div class="empty-state"><div class="icon">📅</div><p>No tasks yet</p></div></div>`;
  const sorted = [...p.tasks].sort((a,b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1; if (!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });
  const groups = {};
  sorted.forEach(t => { const k = t.dueDate || '__none__'; (groups[k] = groups[k] || []).push(t); });
  return `<div id="timeline-view">${Object.entries(groups).map(([k, tasks]) => `
    <div class="tl-group">
      <div class="tl-date">${k === '__none__' ? 'No Date' : fmtDate(k)}</div>
      ${tasks.map(t => `
        <div class="task-card" data-tid="${t.id}" style="margin-bottom:8px">
          <div class="task-card-accent" style="background:${proj()?.color || 'var(--accent)'}"></div>
          <div class="task-card-body">
            <button class="del-btn" data-a="del-task">✕</button>
            <div class="task-title" contenteditable="true" data-a="title" spellcheck="false">${esc(t.title)}</div>
            <div class="task-meta" style="margin-top:6px">${badge(t.status)} ${dueEl(t)}</div>
            <textarea class="task-notes" placeholder="Add notes…" data-a="notes" rows="1">${esc(t.notes || '')}</textarea>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')}</div>`;
}

function linksSection(p) {
  return `<div class="links-section">
    <div class="links-head">
      <span class="links-label">Links &amp; Docs</span>
      <button class="add-link-btn" data-a="add-link">＋ Add Link</button>
    </div>
    ${p.links.map(l => `
      <div class="link-row" data-lid="${l.id}">
        <span style="font-size:13px;color:var(--accent)">🔗</span>
        <span class="link-name" contenteditable="true" data-a="link-name" spellcheck="false">${esc(l.label)}</span>
        <span class="link-url" contenteditable="true" data-a="link-url" spellcheck="false">${esc(l.url || '')}</span>
        ${l.url ? `<a class="link-go" href="${esc(l.url)}" target="_blank" rel="noopener">↗</a>` : '<span class="link-go"></span>'}
        <button class="del-btn" data-a="del-link" style="position:static;opacity:0">✕</button>
      </div>
    `).join('')}
  </div>`;
}

function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  document.getElementById('projects-list').innerHTML = S.projects.map(p => {
    const done = p.tasks.filter(t => t.status === 'done').length;
    const total = p.tasks.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    return `<div class="proj-item${p.id === S.activeId ? ' active' : ''}" data-pid="${p.id}">
      <div class="proj-color-bar" style="background:${p.color}"></div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-progress-row">
          <div class="proj-progress-bar">
            <div class="proj-progress-fill" style="width:${pct}%;background:${p.color}"></div>
          </div>
          <span class="proj-count">${done}/${total}</span>
        </div>
      </div>
      <button class="proj-del" data-a="del-proj" data-pid="${p.id}">✕</button>
    </div>`;
  }).join('');
}

function renderMain() {
  const p = proj();
  const header = document.getElementById('proj-header');
  const content = document.getElementById('content');

  if (!p) {
    header.style.display = 'none';
    content.innerHTML = `<div id="no-project"><div class="icon">◈</div><p>Select a project to get started</p><small>Choose one from the sidebar or create a new one</small></div>`;
    return;
  }

  header.style.display = 'block';
  document.getElementById('proj-title').textContent = p.name;
  document.getElementById('proj-color-chip').style.background = p.color;
  document.getElementById('add-task-btn').style.background = p.color;
  document.getElementById('add-task-btn').style.boxShadow = `0 2px 8px ${hex2rgba(p.color, 0.35)}`;

  const done = p.tasks.filter(t => t.status === 'done').length;
  const ip   = p.tasks.filter(t => t.status === 'in-progress').length;
  const todo = p.tasks.filter(t => t.status === 'todo').length;
  document.getElementById('proj-stats').innerHTML = [
    todo  ? `<span class="stat-chip">○ ${todo} to do</span>` : '',
    ip    ? `<span class="stat-chip" style="color:var(--ip-text)">◐ ${ip} in progress</span>` : '',
    done  ? `<span class="stat-chip" style="color:var(--done-text)">✓ ${done} done</span>` : '',
    !p.tasks.length ? `<span class="stat-chip">No tasks yet</span>` : ''
  ].filter(Boolean).join('');

  document.querySelectorAll('.vbtn').forEach(b => b.classList.toggle('active', b.dataset.view === S.view));

  let html = '';
  if (S.view === 'cards')    html = cardsView(p);
  if (S.view === 'kanban')   html = kanbanView(p);
  if (S.view === 'timeline') html = timelineView(p);
  html += linksSection(p);
  content.innerHTML = html;
  content.querySelectorAll('textarea').forEach(ta => {
    ta.style.height = ta.scrollHeight + 'px';
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
  });
}

function getTask(el) { const c = el.closest('[data-tid]'); return c ? proj()?.tasks.find(t => t.id === c.dataset.tid) : null; }
function getLink(el) { const r = el.closest('[data-lid]'); return r ? proj()?.links.find(l => l.id === r.dataset.lid) : null; }

document.getElementById('projects-list').addEventListener('click', e => {
  const del = e.target.closest('[data-a="del-proj"]');
  if (del) {
    e.stopPropagation();
    if (!confirm('Delete this project and all its tasks?')) return;
    const pid = del.dataset.pid;
    S.projects = S.projects.filter(p => p.id !== pid);
    if (S.activeId === pid) S.activeId = S.projects[0]?.id || null;
    save(); render(); return;
  }
  const item = e.target.closest('[data-pid]');
  if (item) { S.activeId = item.dataset.pid; render(); }
});

document.getElementById('add-proj').addEventListener('click', () => {
  const name = prompt('Project name:');
  if (!name?.trim()) return;
  const colors = ['#6366f1','#f59e0b','#ef4444','#10b981','#8b5cf6','#06b6d4','#f97316','#ec4899'];
  S.projects.push({ id: uid(), name: name.trim(), color: colors[S.projects.length % colors.length], links: [], tasks: [] });
  S.activeId = S.projects[S.projects.length - 1].id;
  save(); render();
});

document.getElementById('view-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.vbtn');
  if (btn) { S.view = btn.dataset.view; renderMain(); }
});

document.getElementById('add-task-btn').addEventListener('click', () => {
  const p = proj(); if (!p) return;
  const task = { id: uid(), title: '', dueDate: '', status: 'todo', notes: '' };
  p.tasks.unshift(task);
  save(); renderMain();
  setTimeout(() => document.querySelector(`[data-tid="${task.id}"] .task-title`)?.focus(), 40);
});

document.getElementById('content').addEventListener('click', e => {
  const p = proj(); if (!p) return;
  const a = e.target.dataset.a || e.target.closest('[data-a]')?.dataset.a;
  if (a === 'status') { const t = getTask(e.target); if (t) { t.status = SN[t.status]; save(); renderMain(); } }
  if (a === 'open-date') { const inp = e.target.closest('.due')?.querySelector('input[type=date]'); if (inp) { inp.style.pointerEvents='auto'; inp.showPicker?.() || inp.click(); } }
  if (a === 'del-task') { const c = e.target.closest('[data-tid]'); if (c) { p.tasks = p.tasks.filter(t => t.id !== c.dataset.tid); save(); renderMain(); } }
  if (a === 'add-link') { p.links.push({ id: uid(), label: 'New link', url: '' }); save(); renderMain(); setTimeout(() => { const els = document.querySelectorAll('.link-name'); if (els.length) { els[els.length-1].focus(); document.execCommand('selectAll'); } }, 40); }
  if (a === 'del-link') { const r = e.target.closest('[data-lid]'); if (r) { p.links = p.links.filter(l => l.id !== r.dataset.lid); save(); renderMain(); } }
});

document.getElementById('content').addEventListener('change', e => {
  if (e.target.dataset.a === 'set-date') { const t = getTask(e.target); if (t) { t.dueDate = e.target.value; save(); renderMain(); } }
});

document.getElementById('content').addEventListener('blur', e => {
  const p = proj(); if (!p) return;
  const a = e.target.dataset.a;
  if (a === 'title')     { const t = getTask(e.target); if (t) { t.title = e.target.textContent.trim() || 'Untitled'; save(); } }
  if (a === 'notes')     { const t = getTask(e.target); if (t) { t.notes = e.target.value; save(); } }
  if (a === 'link-name') { const l = getLink(e.target); if (l) { l.label = e.target.textContent.trim() || 'Link'; save(); } }
  if (a === 'link-url')  { const l = getLink(e.target); if (l) { l.url = e.target.textContent.trim(); save(); renderMain(); } }
}, true);

load(); render();
</script>
</body>
</html>
