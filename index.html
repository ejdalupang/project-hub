<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&display=swap');

:root {
  --bg: #0c0c0c;
  --sidebar-bg: #0c0c0c;
  --surface: #161616;
  --border: #222;
  --text: #f0f0ee;
  --muted: #555;
  --muted2: #333;
  --danger: #ff2d6b;
  --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 260px; min-width: 260px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  border-right: 1px solid var(--border);
}
#sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#logo {
  display: flex; align-items: center; gap: 10px;
}
#logo-mark {
  width: 32px; height: 32px; border-radius: 10px;
  background: #e8ff00; display: flex; align-items: center;
  justify-content: center; font-size: 16px; font-weight: 900; color: #0c0c0c;
  flex-shrink: 0; letter-spacing: -1px;
}
#logo-text {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px; color: #f0f0ee;
  text-transform: uppercase; letter-spacing: 1px;
}
#sidebar-projects-label {
  padding: 20px 20px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
#projects-list {
  flex: 1; overflow-y: auto; padding: 4px 12px 8px;
}
.proj-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; cursor: pointer; border-radius: 12px;
  transition: background 0.1s; user-select: none; margin-bottom: 2px;
  position: relative;
}
.proj-item:hover { background: var(--surface); }
.proj-item.active { background: var(--surface); }
.proj-neon-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.proj-info { flex: 1; min-width: 0; }
.proj-name {
  font-size: 13px; font-weight: 700; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  color: #888; transition: color 0.1s;
}
.proj-item.active .proj-name { color: #f0f0ee; }
.proj-item:hover .proj-name { color: #ccc; }
.proj-prog-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.proj-prog-track {
  flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.proj-prog-fill { height: 100%; border-radius: 2px; }
.proj-prog-label { font-size: 10px; color: var(--muted); font-weight: 600; }
.proj-del {
  opacity: 0; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 11px; padding: 3px 5px; border-radius: 4px;
  transition: all 0.1s; flex-shrink: 0;
}
.proj-item:hover .proj-del { opacity: 1; }
.proj-del:hover { color: var(--danger); }
#add-proj {
  margin: 6px 12px 16px; padding: 10px 14px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: 12px; color: var(--muted);
  cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 700;
  display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;
  text-transform: uppercase; transition: all 0.1s; width: calc(100% - 24px);
}
#add-proj:hover { border-color: #444; color: #888; background: var(--surface); }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

/* Header */
#proj-header { padding: 28px 32px 20px; flex-shrink: 0; display: none; }
#proj-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  margin-bottom: 16px;
}
#proj-title-wrap { flex: 1; min-width: 0; }
#proj-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
#save-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #00ff88; opacity: 0; transition: opacity 0.3s;
}
#save-dot.show { opacity: 1; }
#proj-title {
  font-size: 36px; font-weight: 900; letter-spacing: -1.5px;
  line-height: 1; text-transform: uppercase; color: #f0f0ee;
}
#proj-header-actions {
  display: flex; align-items: center; gap: 8px; padding-top: 8px;
}
#view-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 3px; gap: 2px;
}
.vbtn {
  padding: 6px 14px; border-radius: 8px; border: none;
  background: none; cursor: pointer; font-size: 11.5px; font-weight: 700;
  color: var(--muted); transition: all 0.1s; font-family: inherit;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.vbtn.active { background: #222; color: var(--text); }
.vbtn:hover:not(.active) { color: #888; }
#add-task-btn {
  padding: 8px 18px; color: #0c0c0c; border: none;
  border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 800;
  font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
  flex-shrink: 0; transition: transform 0.1s, filter 0.1s;
  background: #e8ff00;
}
#add-task-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
#add-task-btn:active { transform: translateY(0); }

/* Stats row */
#proj-stats {
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid var(--border); padding-top: 16px;
}
.stat-pill {
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase; border: 1px solid var(--border);
  color: var(--muted); background: var(--surface);
}
.stat-pill.done    { color: #00ff88; border-color: #00ff8830; background: #00ff8810; }
.stat-pill.ongoing { color: #00d4ff; border-color: #00d4ff30; background: #00d4ff10; }
.stat-pill.inprog { color: #e8ff00; border-color: #e8ff0030; background: #e8ff0010; }
.stat-pill.todo  { color: #888; }

/* ── Content ── */
#content { flex: 1; overflow-y: auto; padding: 0 32px 40px; }

/* ── Cards view ── */
#cards-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px; align-items: start;
}

/* ── Task card (neon block) ── */
.task-card {
  border-radius: var(--r); padding: 18px 18px 16px;
  position: relative; overflow: hidden; min-height: 140px;
  display: flex; flex-direction: column; gap: 10px;
  transition: transform 0.12s, filter 0.12s; cursor: default;
  border: none;
}
.task-card:hover { transform: translateY(-2px); filter: brightness(1.04); }
.task-card:hover .del-btn { opacity: 1; }
.task-card.is-done { filter: brightness(0.55) saturate(0.5); }
.task-card.is-done:hover { filter: brightness(0.65) saturate(0.6); }

.card-top { display: flex; align-items: center; justify-content: space-between; }
.status-circle {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid rgba(0,0,0,0.25); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: rgba(0,0,0,0.5);
  transition: all 0.12s; flex-shrink: 0;
}
.status-circle:hover { background: rgba(0,0,0,0.12); }
.status-circle.done { background: rgba(0,0,0,0.2); border-color: rgba(0,0,0,0.3); color: rgba(0,0,0,0.7); }
.status-circle.in-progress { border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.6); }
.status-circle.ongoing { border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.6); border-style: dashed; }

.del-btn {
  background: rgba(0,0,0,0.15); border: none; color: rgba(0,0,0,0.4);
  cursor: pointer; opacity: 0; transition: all 0.12s;
  font-size: 11px; padding: 4px 6px; border-radius: 6px;
  position: absolute; top: 14px; right: 14px; z-index: 2;
}
.del-btn:hover { background: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }

.task-title {
  font-size: 18px; font-weight: 900; line-height: 1.15;
  letter-spacing: -0.5px; text-transform: uppercase;
  color: rgba(0,0,0,0.85); outline: none; flex: 1;
  padding-right: 8px;
}
.task-title[contenteditable="true"]:empty::before {
  content: 'TASK NAME…'; opacity: 0.35;
}

.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.due {
  font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.45);
  cursor: pointer; padding: 3px 7px; border-radius: 6px;
  background: rgba(0,0,0,0.1); display: inline-flex; align-items: center; gap: 4px;
  transition: background 0.1s; position: relative; text-transform: uppercase; letter-spacing: 0.3px;
}
.due:hover { background: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
.due.overdue { background: rgba(0,0,0,0.2); color: #ff2d6b; }
.due input[type="date"] {
  position: absolute; opacity: 0; pointer-events: none;
  width: 1px; height: 1px; top: 0; left: 0;
}

.task-notes {
  width: 100%; background: rgba(0,0,0,0.08); border: none; outline: none; resize: none;
  font-size: 11.5px; color: rgba(0,0,0,0.5); font-family: inherit;
  line-height: 1.5; border-radius: 8px; padding: 6px 8px;
  transition: background 0.1s;
}
.task-notes::placeholder { color: rgba(0,0,0,0.25); }
.task-notes:focus { background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.7); }

/* ── Kanban ── */
#kanban-view { display: flex; gap: 10px; align-items: flex-start; }
.k-col { flex: 1; min-width: 0; }
.k-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding: 0 2px;
}
.k-col-title {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.k-count {
  font-size: 10px; background: var(--surface); color: var(--muted);
  padding: 2px 7px; border-radius: 10px; font-weight: 700;
  border: 1px solid var(--border);
}
.k-cards { display: flex; flex-direction: column; gap: 8px; }
.k-empty {
  border: 1px dashed var(--border); border-radius: var(--r);
  padding: 24px; text-align: center; font-size: 11px;
  color: var(--muted2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── Timeline ── */
#timeline-view { max-width: 640px; }
.tl-group { margin-bottom: 32px; }
.tl-date {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
}
.tl-date::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.tl-date.tl-ongoing { color: #00d4ff; }

/* ── Project notes ── */
#proj-notes-wrap {
  margin: 0 32px; padding: 16px 0 20px; flex-shrink: 0;
  border-top: 1px solid var(--border); display: none;
}
#proj-notes-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
}
#proj-notes {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  outline: none; resize: none; border-radius: 12px;
  font-size: 13px; color: #bbb; font-family: inherit; line-height: 1.6;
  padding: 12px 14px; transition: border-color 0.1s, color 0.1s;
}
#proj-notes::placeholder { color: var(--muted2); }
#proj-notes:focus { border-color: #444; color: #ddd; }

/* ── Links ── */
.links-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
.links-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.links-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.link-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 10px; transition: background 0.1s;
}
.link-row:hover { background: var(--surface); }
.link-row:hover .del-btn { opacity: 1; }
.link-name {
  font-size: 13px; color: #e8ff00; outline: none; flex: 1;
  font-weight: 700;
}
.link-name:focus { border-bottom: 1px solid #e8ff00; }
.link-url { font-size: 11.5px; color: var(--muted); outline: none; flex: 2; }
.link-url:empty::before { content: 'Paste URL…'; color: var(--muted2); }
.link-go {
  font-size: 11px; color: #e8ff00; text-decoration: none;
  padding: 3px 7px; border-radius: 6px; opacity: 0;
  transition: opacity 0.1s; background: #e8ff0015; flex-shrink: 0;
}
.link-row:hover .link-go { opacity: 1; }
.add-link-btn {
  background: none; border: 1px dashed var(--border); color: var(--muted);
  font-size: 11px; padding: 6px 14px; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.1s;
}
.add-link-btn:hover { border-color: #444; color: #888; background: var(--surface); }
/* inline del for links */
.link-del {
  opacity: 0; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 11px; padding: 3px 5px; border-radius: 4px;
  transition: all 0.1s; flex-shrink: 0;
}
.link-row:hover .link-del { opacity: 1; }
.link-del:hover { color: var(--danger); }

/* ── Empty ── */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--muted2);
  grid-column: 1 / -1;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state p { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.empty-state small { font-size: 12px; margin-top: 6px; display: block; color: var(--muted2); }

#no-project {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted2); text-align: center; padding: 40px;
}
#no-project .big { font-size: 64px; font-weight: 900; letter-spacing: -3px; text-transform: uppercase; color: #1a1a1a; line-height: 1; margin-bottom: 16px; }
#no-project p { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

/* ── Task Detail Drawer ── */
#drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
}
#drawer-overlay.open { opacity: 1; pointer-events: all; }
#task-drawer {
  position: fixed; top: 0; right: 0; height: 100vh; width: 460px;
  background: #111; border-left: 1px solid #2a2a2a;
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.22s cubic-bezier(.4,0,.2,1);
  z-index: 101; overflow: hidden;
}
#task-drawer.open { transform: translateX(0); }
#drawer-header {
  padding: 20px 24px 16px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
  display: flex; align-items: flex-start; gap: 12px;
}
#drawer-color-bar {
  width: 4px; min-height: 48px; border-radius: 4px; flex-shrink: 0; margin-top: 4px;
}
#drawer-title-wrap { flex: 1; min-width: 0; }
#drawer-title {
  font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
  text-transform: uppercase; color: var(--text); outline: none;
  line-height: 1.15; word-break: break-word;
}
#drawer-title:empty::before { content: 'TASK NAME…'; opacity: 0.25; }
#drawer-close {
  background: #1e1e1e; border: none; color: var(--muted); cursor: pointer;
  font-size: 14px; padding: 6px 8px; border-radius: 8px; flex-shrink: 0;
  transition: background 0.1s, color 0.1s; margin-top: 2px;
}
#drawer-close:hover { background: #2a2a2a; color: var(--text); }
#drawer-meta {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; flex-wrap: wrap;
}
.drawer-status-btn {
  display: flex; align-items: center; gap: 6px; background: #1e1e1e;
  border: 1px solid #2a2a2a; border-radius: 20px; cursor: pointer;
  padding: 5px 12px; color: var(--text); font-family: inherit; font-size: 12px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.1s;
}
.drawer-status-btn:hover { background: #252525; }
.drawer-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.drawer-due-btn {
  display: flex; align-items: center; gap: 6px; background: #1e1e1e;
  border: 1px solid #2a2a2a; border-radius: 20px; cursor: pointer;
  padding: 5px 12px; color: var(--muted); font-family: inherit; font-size: 12px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.1s;
  position: relative;
}
.drawer-due-btn:hover { background: #252525; color: var(--text); }
.drawer-due-btn.overdue { color: var(--danger); }
.drawer-due-btn input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
}
#drawer-notes-section {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 16px 24px 0;
}
#drawer-notes-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; flex-shrink: 0;
}
#drawer-toolbar {
  display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0;
  background: #161616; border: 1px solid #222; border-radius: 10px; padding: 4px;
}
.tb-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 800; padding: 5px 10px;
  border-radius: 7px; transition: background 0.1s, color 0.1s;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.tb-btn:hover { background: #222; color: var(--text); }
.tb-btn.active { background: #2a2a2a; color: var(--text); }
.tb-sep { width: 1px; background: #222; margin: 4px 2px; }
#drawer-notes {
  flex: 1; outline: none; color: #bbb; font-family: inherit;
  font-size: 14px; line-height: 1.7; overflow-y: auto; padding-bottom: 24px;
  min-height: 0;
}
#drawer-notes:empty::before { content: 'Add notes…'; color: #333; pointer-events: none; }
#drawer-notes ul, #drawer-notes ol {
  padding-left: 20px; margin: 4px 0;
}
#drawer-notes li { margin: 2px 0; }
#drawer-notes p { margin: 0; min-height: 1.7em; }
#drawer-notes:focus { color: #ccc; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="logo">
      <div id="logo-mark">PH</div>
      <div id="logo-text">Project Hub</div>
    </div>
  </div>
  <div id="sidebar-projects-label">Projects</div>
  <div id="projects-list"></div>
  <button id="add-proj">＋ New Project</button>
</div>

<div id="main">
  <div id="proj-header">
    <div id="proj-header-top">
      <div id="proj-title-wrap">
        <div id="proj-eyebrow">
          <span>Active Project</span>
          <div id="save-dot"></div>
        </div>
        <div id="proj-title"></div>
      </div>
      <div id="proj-header-actions">
        <div id="view-toggle">
          <button class="vbtn active" data-view="cards">Cards</button>
          <button class="vbtn" data-view="kanban">Kanban</button>
          <button class="vbtn" data-view="timeline">Timeline</button>
        </div>
        <button id="add-task-btn">＋ Add Task</button>
      </div>
    </div>
    <div id="proj-stats"></div>
  </div>
  <div id="proj-notes-wrap">
    <div id="proj-notes-label">Project Notes</div>
    <textarea id="proj-notes" rows="2" placeholder="Add notes about this project…"></textarea>
  </div>
  <div id="content">
    <div id="no-project">
      <div class="big">Select<br>a Project</div>
      <p>← Choose from the sidebar</p>
    </div>
  </div>
</div>

<div id="drawer-overlay"></div>
<div id="task-drawer">
  <div id="drawer-header">
    <div id="drawer-color-bar"></div>
    <div id="drawer-title-wrap">
      <div id="drawer-title" contenteditable="true" spellcheck="false"></div>
    </div>
    <button id="drawer-close">✕</button>
  </div>
  <div id="drawer-meta">
    <button class="drawer-status-btn" id="drawer-status-btn">
      <span class="drawer-status-dot" id="drawer-status-dot"></span>
      <span id="drawer-status-label"></span>
    </button>
    <button class="drawer-due-btn" id="drawer-due-btn">
      <span id="drawer-due-label"></span>
      <input type="date" id="drawer-date-input">
    </button>
  </div>
  <div id="drawer-notes-section">
    <div id="drawer-notes-label">Notes</div>
    <div id="drawer-toolbar">
      <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">• List</button>
      <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-cmd="indent" title="Indent">→ Indent</button>
      <button class="tb-btn" data-cmd="outdent" title="Outdent">← Outdent</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
      <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
    </div>
    <div id="drawer-notes" contenteditable="true" spellcheck="true"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'project-hub-data-v2';

const NEONS = ['#e8ff00','#b668ff','#00ff88','#ff2d6b','#00d4ff','#ff6b00','#ff9de2','#a8ff3e'];

const DEFAULT_DATA = {
  projects: [
    {
      id: 'p1', name: 'Building Blocks Sprint', color: '#e8ff00', notes: '',
      links: [{ id: 'l1', label: 'Designers Checklist', url: '' }],
      tasks: [
        { id: 't1', title: 'Setup Catchup with Jade', dueDate: '2026-02-02', status: 'done', notes: '' },
        { id: 't2', title: 'Prep 3 things to discuss for the meet', dueDate: '2026-02-03', status: 'done', notes: '' },
        { id: 't3', title: 'Review Sprint 1 Templates', dueDate: '2026-02-04', status: 'done', notes: '' },
        { id: 't4', title: 'Prep Kick-off Deck', dueDate: '2026-02-06', status: 'done', notes: '' },
        { id: 't5', title: 'Kick-off Meeting', dueDate: '2026-02-11', status: 'done', notes: '' },
        { id: 't6', title: "Create Reviewers and Designer's Checklist", dueDate: '2026-02-19', status: 'done', notes: '' }
      ]
    },
    {
      id: 'p2', name: 'Video Template Auditing (IBEX)', color: '#b668ff', notes: '',
      links: [
        { id: 'l1', label: 'Monday Board Process', url: '' },
        { id: 'l2', label: 'Ibex Doc Sync', url: '' }
      ],
      tasks: [
        { id: 't1', title: 'Review & audit video templates', dueDate: '2026-02-20', status: 'in-progress', notes: '' },
        { id: 't2', title: 'Weekly syncs (Mon–Thu)', dueDate: '2026-02-09', status: 'done', notes: 'Mon ✓, Tue ✓, Wed (N/A), Thu (N/A), Thu Prep Remit' },
        { id: 't3', title: 'Create agenda sheet for Mohid', dueDate: '2026-02-16', status: 'done', notes: '' }
      ]
    },
    { id: 'p3', name: 'Identifying Bugs and Resolution', color: '#ff2d6b', notes: '', links: [], tasks: [] },
    { id: 'p4', name: 'Day to Day / Misc.', color: '#00ff88', notes: '', links: [], tasks: [] },
    { id: 'p5', name: 'Creator Template Audit Deck', color: '#00d4ff', notes: '', links: [], tasks: [] },
    {
      id: 'p6', name: 'CVA Talking Heads', color: '#ff6b00', notes: '',
      links: [
        { id: 'l1', label: 'CVA Strat, Briefs, and Everything', url: '' },
        { id: 'l2', label: 'Canvagram IOs (Safari)', url: '' },
        { id: 'l3', label: 'Annotation Tool', url: '' }
      ],
      tasks: []
    },
    { id: 'p7', name: "Hackathon '26: Design Consistency Reviewer", color: '#ff9de2', notes: '', links: [], tasks: [] },
    {
      id: 'p8', name: 'UGC Social Media Templates', color: '#a8ff3e', notes: '',
      links: [{ id: 'l1', label: 'Visual Review Queue Tutorial', url: '' }],
      tasks: [{ id: 't1', title: 'Visual Review For Social UGC', dueDate: '2026-06-11', status: 'in-progress', notes: '' }]
    }
  ]
};

let S = { projects: [], activeId: null, view: 'cards' };
function uid() { return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,6); }

function load() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    S.projects = (stored ? JSON.parse(stored) : DEFAULT_DATA).projects || [];
  } catch { S.projects = DEFAULT_DATA.projects; }
  if (S.projects.length) S.activeId = S.projects[0].id;
}

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: S.projects }));
    const dot = document.getElementById('save-dot');
    dot.classList.add('show');
    setTimeout(() => dot.classList.remove('show'), 1200);
  }, 400);
}

const proj = () => S.projects.find(p => p.id === S.activeId);
const SN = { todo: 'in-progress', 'in-progress': 'ongoing', ongoing: 'done', done: 'todo' };

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}
function isOverdue(d, s) { return d && s !== 'done' && new Date(d) < new Date(new Date().toDateString()); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function statusIcon(status) {
  if (status === 'done')        return '✓';
  if (status === 'in-progress') return '◑';
  if (status === 'ongoing')     return '∞';
  return '';
}

function dueEl(task) {
  const ov = isOverdue(task.dueDate, task.status);
  return `<span class="due${ov ? ' overdue' : ''}" data-a="open-date">
    ${task.dueDate ? fmtDate(task.dueDate) : '+ Date'}
    <input type="date" value="${task.dueDate || ''}" data-a="set-date">
  </span>`;
}

function cardHtml(task, slim = false) {
  const p = proj();
  const color = p?.color || '#e8ff00';
  const isDone = task.status === 'done';
  return `<div class="task-card${isDone ? ' is-done' : ''}" data-tid="${task.id}" style="background:${color}">
    <div class="card-top">
      <button class="status-circle ${task.status}" data-a="status">${statusIcon(task.status)}</button>
    </div>
    <button class="del-btn" data-a="del-task">✕</button>
    <div class="task-title" contenteditable="true" data-a="title" spellcheck="false">${esc(task.title)}</div>
    <textarea class="task-notes" placeholder="Add notes…" data-a="notes" rows="1">${esc(task.notes || '')}</textarea>
    <div class="card-bottom">${dueEl(task)}</div>
  </div>`;
}

function cardsView(p) {
  if (!p.tasks.length)
    return `<div id="cards-view"><div class="empty-state"><div class="icon">✦</div><p>No tasks yet</p><small>Hit "+ Add Task" to get started</small></div></div>`;
  return `<div id="cards-view">${p.tasks.map(t => cardHtml(t)).join('')}</div>`;
}

function kanbanView(p) {
  const cols = [
    { key: 'todo',        label: 'To Do' },
    { key: 'in-progress', label: 'In Progress' },
    { key: 'ongoing',     label: 'Ongoing' },
    { key: 'done',        label: 'Done' }
  ];
  return `<div id="kanban-view">${cols.map(col => {
    const tasks = p.tasks.filter(t => t.status === col.key);
    return `<div class="k-col">
      <div class="k-col-head">
        <span class="k-col-title">${col.label}</span>
        <span class="k-count">${tasks.length}</span>
      </div>
      <div class="k-cards">${tasks.length
        ? tasks.map(t => cardHtml(t, true)).join('')
        : `<div class="k-empty">Empty</div>`
      }</div>
    </div>`;
  }).join('')}</div>`;
}

function timelineView(p) {
  if (!p.tasks.length)
    return `<div id="timeline-view"><div class="empty-state"><div class="icon">↕</div><p>No tasks yet</p></div></div>`;
  const ongoingTasks = p.tasks.filter(t => t.status === 'ongoing');
  const rest = p.tasks.filter(t => t.status !== 'ongoing');
  const sorted = [...rest].sort((a,b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1; if (!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });
  const groups = {};
  sorted.forEach(t => { const k = t.dueDate || '__'; (groups[k] = groups[k] || []).push(t); });
  const ongoingSection = ongoingTasks.length ? `
    <div class="tl-group">
      <div class="tl-date tl-ongoing">∞ Ongoing</div>
      ${ongoingTasks.map(t => cardHtml(t)).join('')}
    </div>` : '';
  return `<div id="timeline-view">${ongoingSection}${Object.entries(groups).map(([k, tasks]) => `
    <div class="tl-group">
      <div class="tl-date">${k === '__' ? 'No Date' : fmtDate(k)}</div>
      ${tasks.map(t => cardHtml(t)).join('')}
    </div>
  `).join('')}</div>`;
}

function linksSection(p) {
  return `<div class="links-section">
    <div class="links-head">
      <span class="links-label">Links &amp; Docs</span>
      <button class="add-link-btn" data-a="add-link">＋ Add</button>
    </div>
    ${p.links.map(l => `
      <div class="link-row" data-lid="${l.id}">
        <span style="font-size:14px">🔗</span>
        <span class="link-name" contenteditable="true" data-a="link-name" spellcheck="false">${esc(l.label)}</span>
        <span class="link-url" contenteditable="true" data-a="link-url" spellcheck="false">${esc(l.url || '')}</span>
        ${l.url ? `<a class="link-go" href="${esc(l.url)}" target="_blank" rel="noopener">↗</a>` : '<span></span>'}
        <button class="link-del" data-a="del-link">✕</button>
      </div>
    `).join('')}
  </div>`;
}

function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  document.getElementById('projects-list').innerHTML = S.projects.map(p => {
    const done = p.tasks.filter(t => t.status === 'done').length;
    const total = p.tasks.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    return `<div class="proj-item${p.id === S.activeId ? ' active' : ''}" data-pid="${p.id}">
      <div class="proj-neon-dot" style="background:${p.color}"></div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-prog-row">
          <div class="proj-prog-track">
            <div class="proj-prog-fill" style="width:${pct}%;background:${p.color}"></div>
          </div>
          <span class="proj-prog-label">${done}/${total}</span>
        </div>
      </div>
      <button class="proj-del" data-a="del-proj" data-pid="${p.id}">✕</button>
    </div>`;
  }).join('');
}

function renderMain() {
  const p = proj();
  const header = document.getElementById('proj-header');
  const content = document.getElementById('content');

  const notesWrap = document.getElementById('proj-notes-wrap');
  if (!p) {
    header.style.display = 'none';
    notesWrap.style.display = 'none';
    content.innerHTML = `<div id="no-project"><div class="big">Select<br>a Project</div><p>← Choose from the sidebar</p></div>`;
    return;
  }
  notesWrap.style.display = 'block';

  header.style.display = 'block';
  document.getElementById('proj-title').textContent = p.name;
  document.getElementById('add-task-btn').style.background = p.color;

  const notesEl = document.getElementById('proj-notes');
  notesEl.value = p.notes || '';
  notesEl.style.height = 'auto';
  notesEl.style.height = Math.max(notesEl.scrollHeight, 40) + 'px';

  const done    = p.tasks.filter(t => t.status === 'done').length;
  const ip      = p.tasks.filter(t => t.status === 'in-progress').length;
  const ongoing = p.tasks.filter(t => t.status === 'ongoing').length;
  const todo    = p.tasks.filter(t => t.status === 'todo').length;
  document.getElementById('proj-stats').innerHTML = [
    todo    ? `<span class="stat-pill todo">${todo} To Do</span>` : '',
    ip      ? `<span class="stat-pill inprog">${ip} In Progress</span>` : '',
    ongoing ? `<span class="stat-pill ongoing">${ongoing} Ongoing</span>` : '',
    done    ? `<span class="stat-pill done">${done} Done</span>` : '',
    !p.tasks.length ? `<span class="stat-pill">No tasks yet</span>` : ''
  ].filter(Boolean).join('');

  document.querySelectorAll('.vbtn').forEach(b => b.classList.toggle('active', b.dataset.view === S.view));

  let html = '';
  if (S.view === 'cards')    html = cardsView(p);
  if (S.view === 'kanban')   html = kanbanView(p);
  if (S.view === 'timeline') html = timelineView(p);
  html += linksSection(p);
  content.innerHTML = html;
  content.querySelectorAll('textarea').forEach(ta => {
    ta.style.height = ta.scrollHeight + 'px';
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
  });
}

function getTask(el) { const c = el.closest('[data-tid]'); return c ? proj()?.tasks.find(t => t.id === c.dataset.tid) : null; }
function getLink(el) { const r = el.closest('[data-lid]'); return r ? proj()?.links.find(l => l.id === r.dataset.lid) : null; }

document.getElementById('projects-list').addEventListener('click', e => {
  const del = e.target.closest('[data-a="del-proj"]');
  if (del) {
    e.stopPropagation();
    if (!confirm('Delete this project?')) return;
    const pid = del.dataset.pid;
    S.projects = S.projects.filter(p => p.id !== pid);
    if (S.activeId === pid) S.activeId = S.projects[0]?.id || null;
    save(); render(); return;
  }
  const item = e.target.closest('[data-pid]');
  if (item) { S.activeId = item.dataset.pid; render(); }
});

document.getElementById('add-proj').addEventListener('click', () => {
  const name = prompt('Project name:');
  if (!name?.trim()) return;
  S.projects.push({ id: uid(), name: name.trim(), color: NEONS[S.projects.length % NEONS.length], links: [], tasks: [] });
  S.activeId = S.projects[S.projects.length - 1].id;
  save(); render();
});

document.getElementById('view-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.vbtn');
  if (btn) { S.view = btn.dataset.view; renderMain(); }
});

document.getElementById('add-task-btn').addEventListener('click', () => {
  const p = proj(); if (!p) return;
  const task = { id: uid(), title: '', dueDate: '', status: 'todo', notes: '' };
  p.tasks.unshift(task);
  save(); renderMain();
  setTimeout(() => document.querySelector(`[data-tid="${task.id}"] .task-title`)?.focus(), 40);
});

document.getElementById('content').addEventListener('click', e => {
  const p = proj(); if (!p) return;
  const a = e.target.dataset.a || e.target.closest('[data-a]')?.dataset.a;
  if (a === 'status') { const t = getTask(e.target); if (t) { t.status = SN[t.status]; save(); renderMain(); } }
  if (a === 'open-date') { const inp = e.target.closest('.due')?.querySelector('input[type=date]'); if (inp) { inp.style.pointerEvents='auto'; inp.showPicker?.() || inp.click(); } }
  if (a === 'del-task') { const c = e.target.closest('[data-tid]'); if (c) { p.tasks = p.tasks.filter(t => t.id !== c.dataset.tid); save(); renderMain(); } }
  if (a === 'add-link') { p.links.push({ id: uid(), label: 'New link', url: '' }); save(); renderMain(); setTimeout(() => { const els = document.querySelectorAll('.link-name'); if (els.length) { els[els.length-1].focus(); document.execCommand('selectAll'); } }, 40); }
  if (a === 'del-link') { const r = e.target.closest('[data-lid]'); if (r) { p.links = p.links.filter(l => l.id !== r.dataset.lid); save(); renderMain(); } }
});

document.getElementById('content').addEventListener('change', e => {
  if (e.target.dataset.a === 'set-date') { const t = getTask(e.target); if (t) { t.dueDate = e.target.value; save(); renderMain(); } }
});

document.getElementById('content').addEventListener('blur', e => {
  const p = proj(); if (!p) return;
  const a = e.target.dataset.a;
  if (a === 'title')     { const t = getTask(e.target); if (t) { t.title = e.target.textContent.trim() || 'Untitled'; save(); } }
  if (a === 'notes')     { const t = getTask(e.target); if (t) { t.notes = e.target.value; save(); } }
  if (a === 'link-name') { const l = getLink(e.target); if (l) { l.label = e.target.textContent.trim() || 'Link'; save(); } }
  if (a === 'link-url')  { const l = getLink(e.target); if (l) { l.url = e.target.textContent.trim(); save(); renderMain(); } }
}, true);

document.getElementById('proj-notes').addEventListener('input', e => {
  const p = proj(); if (!p) return;
  p.notes = e.target.value;
  e.target.style.height = 'auto';
  e.target.style.height = Math.max(e.target.scrollHeight, 40) + 'px';
  save();
});

load(); render();

// ── Task Drawer ───────────────────────────────────────────────────────────────
const STATUS_COLORS = { todo: '#444', 'in-progress': '#f59e0b', ongoing: '#00d4ff', done: '#00ff88' };
const STATUS_LABELS = { todo: 'To Do', 'in-progress': 'In Progress', ongoing: 'Ongoing', done: 'Done' };
let drawerTaskId = null;

function openDrawer(taskId) {
  const p = proj(); if (!p) return;
  const task = p.tasks.find(t => t.id === taskId); if (!task) return;
  drawerTaskId = taskId;

  document.getElementById('drawer-color-bar').style.background = p.color;
  const titleEl = document.getElementById('drawer-title');
  titleEl.textContent = task.title;

  updateDrawerMeta(task);

  const notesEl = document.getElementById('drawer-notes');
  notesEl.innerHTML = task.notes || '';

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('task-drawer').classList.add('open');
  setTimeout(() => notesEl.focus(), 250);
}

function updateDrawerMeta(task) {
  const dot = document.getElementById('drawer-status-dot');
  const label = document.getElementById('drawer-status-label');
  dot.style.background = STATUS_COLORS[task.status] || '#444';
  label.textContent = STATUS_LABELS[task.status] || task.status;

  const dueBtn = document.getElementById('drawer-due-btn');
  const dueLabel = document.getElementById('drawer-due-label');
  const dateInput = document.getElementById('drawer-date-input');
  dateInput.value = task.dueDate || '';
  const ov = isOverdue(task.dueDate, task.status);
  dueBtn.className = 'drawer-due-btn' + (ov ? ' overdue' : '');
  dueLabel.textContent = task.dueDate ? fmtDate(task.dueDate) : '+ Add Date';
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('task-drawer').classList.remove('open');
  drawerTaskId = null;
}

function getDrawerTask() {
  const p = proj(); if (!p || !drawerTaskId) return null;
  return p.tasks.find(t => t.id === drawerTaskId) || null;
}

document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);

document.getElementById('drawer-title').addEventListener('blur', () => {
  const t = getDrawerTask(); if (!t) return;
  const val = document.getElementById('drawer-title').textContent.trim();
  t.title = val || 'Untitled';
  save(); renderMain();
});

document.getElementById('drawer-status-btn').addEventListener('click', () => {
  const t = getDrawerTask(); if (!t) return;
  t.status = SN[t.status];
  updateDrawerMeta(t);
  save(); renderMain();
});

document.getElementById('drawer-date-input').addEventListener('change', e => {
  const t = getDrawerTask(); if (!t) return;
  t.dueDate = e.target.value;
  updateDrawerMeta(t);
  save(); renderMain();
});

document.getElementById('drawer-notes').addEventListener('input', () => {
  const t = getDrawerTask(); if (!t) return;
  t.notes = document.getElementById('drawer-notes').innerHTML;
  save();
});

document.getElementById('drawer-toolbar').addEventListener('click', e => {
  const btn = e.target.closest('.tb-btn'); if (!btn) return;
  e.preventDefault();
  document.getElementById('drawer-notes').focus();
  document.execCommand(btn.dataset.cmd, false, null);
  document.getElementById('drawer-notes').dispatchEvent(new Event('input'));
});

document.getElementById('content').addEventListener('click', e => {
  const card = e.target.closest('.task-card');
  if (!card) return;
  const ignore = e.target.closest('.del-btn, .status-circle, .due, input[type=date], textarea');
  if (ignore) return;
  openDrawer(card.dataset.tid);
}, true);
</script>
</body>
</html>
