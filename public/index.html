<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Project Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&display=swap">
<style>

:root {
  --bg: #0c0c0c;
  --sidebar-bg: #0c0c0c;
  --surface: #161616;
  --border: #222;
  --text: #f0f0ee;
  --muted: #555;
  --muted2: #333;
  --danger: #ff2d6b;
  --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 260px; min-width: 260px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  border-right: 1px solid var(--border);
}
#sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#logo {
  display: flex; align-items: center; gap: 10px;
}
#logo-mark {
  width: 32px; height: 32px; border-radius: 10px;
  background: #e8ff00; display: flex; align-items: center;
  justify-content: center; font-size: 16px; font-weight: 900; color: #0c0c0c;
  flex-shrink: 0; letter-spacing: -1px;
}
#logo-text {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px; color: #f0f0ee;
  text-transform: uppercase; letter-spacing: 1px;
}
#sidebar-projects-label {
  padding: 20px 20px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
.sidebar-group-label {
  padding: 12px 20px 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
#projects-list {
  flex: 1; overflow-y: auto; padding: 4px 12px 8px;
}
.proj-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; cursor: pointer; border-radius: 12px;
  transition: background 0.1s, opacity 0.1s; user-select: none; margin-bottom: 2px;
  position: relative;
}
.proj-item.dragging { opacity: 0.35; }
.proj-item.drop-before { box-shadow: inset 0  3px 0 -1px #e8ff00; }
.proj-item.drop-after  { box-shadow: inset 0 -3px 0 -1px #e8ff00; }
.proj-item:hover { background: var(--surface); }
.proj-item.active { background: var(--surface); }
.proj-neon-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.proj-info { flex: 1; min-width: 0; }
.proj-name {
  font-size: 13px; font-weight: 700; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  color: #888; transition: color 0.1s;
}
.proj-item.active .proj-name { color: #f0f0ee; }
.proj-item:hover .proj-name { color: #ccc; }
.proj-prog-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.proj-prog-track {
  flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.proj-prog-fill { height: 100%; border-radius: 2px; }
.proj-prog-label { font-size: 10px; color: var(--muted); font-weight: 600; }
.proj-del {
  opacity: 0; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 11px; padding: 3px 5px; border-radius: 4px;
  transition: all 0.1s; flex-shrink: 0;
}
.proj-item:hover .proj-del { opacity: 1; }
.proj-del:hover { color: var(--danger); }
#schedule-btn {
  margin: 6px 12px 4px; padding: 10px 14px;
  background: transparent; border: 1px solid #1e1e1e;
  border-radius: 12px; color: var(--muted);
  cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 700;
  display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;
  text-transform: uppercase; transition: all 0.1s; width: calc(100% - 24px);
}
#schedule-btn:hover { border-color: #444; color: #888; background: var(--surface); }
#schedule-btn.active { border-color: #e8ff0055; color: #e8ff00; background: #e8ff0008; }
#add-proj {
  margin: 4px 12px 16px; padding: 10px 14px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: 12px; color: var(--muted);
  cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 700;
  display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;
  text-transform: uppercase; transition: all 0.1s; width: calc(100% - 24px);
}
#add-proj:hover { border-color: #444; color: #888; background: var(--surface); }
#fb-auth-btn {
  margin: 4px 12px 16px; padding: 10px 14px;
  background: transparent; border: 1px solid #2a4a2a;
  border-radius: 12px; color: #4a8a4a;
  cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 700;
  display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;
  text-transform: uppercase; transition: all 0.1s; width: calc(100% - 24px);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#fb-auth-btn::before { content: '☁'; font-size: 13px; }
#fb-auth-btn:hover { border-color: #3a7a3a; color: #6aaa6a; background: #0a1a0a; }
#fb-auth-btn[data-signed="1"] { border-color: #00ff8833; color: #00ff88; }
#fb-auth-btn[data-signed="1"]:hover { background: #00ff8808; }

/* ── Schedule View ── */
#schedule-view {
  display: none; flex: 1; overflow: hidden; flex-direction: column;
}
#schedule-view.active { display: flex; }
#schedule-header {
  padding: 20px 24px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
#schedule-week-label {
  font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: var(--text);
  text-transform: uppercase;
}
#schedule-nav { display: flex; align-items: center; gap: 8px; }
.sched-nav-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 14px;
  padding: 5px 10px; border-radius: 8px; transition: all 0.1s; font-family: inherit;
}
.sched-nav-btn:hover { border-color: #444; color: var(--text); }
#sched-today-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 10px; font-weight: 800;
  padding: 5px 12px; border-radius: 8px; transition: all 0.1s;
  font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
}
#sched-today-btn:hover { border-color: #444; color: var(--text); }
#sched-find-btn {
  background: #e8ff0010; border: 1px solid #e8ff0033;
  color: #e8ff00; cursor: pointer; font-size: 11px; font-weight: 800;
  padding: 7px 16px; border-radius: 10px; transition: all 0.1s;
  font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 6px;
}
#sched-find-btn:hover { background: #e8ff0020; border-color: #e8ff0066; }
#sched-find-btn.loading { opacity: 0.5; pointer-events: none; }
#schedule-body {
  flex: 1; overflow: hidden; display: flex; gap: 0;
}
#schedule-grid-wrap {
  flex: 1; overflow: auto; position: relative;
}
#schedule-grid {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  min-width: 700px;
}
.sched-day-header {
  padding: 10px 8px 10px; text-align: center;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 5;
}
.sched-day-header:first-child { border-right: 1px solid var(--border); }
.sched-day-name {
  font-size: 9px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.sched-day-date {
  font-size: 18px; font-weight: 900; color: var(--text);
  letter-spacing: -1px; line-height: 1.1; margin-top: 2px;
}
.sched-day-header.today { border-bottom: 2px solid #e8ff00; }
.sched-day-header.today .sched-day-name { color: #e8ff00; }
.sched-day-header.today .sched-day-date { color: #e8ff00; }
.sched-time-gutter {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid #1a1a1a;
  padding: 0 6px; display: flex; align-items: flex-start;
  justify-content: flex-end; padding-top: 2px;
  position: relative;
}
.sched-time-label {
  font-size: 9px; font-weight: 700; color: #333;
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  transform: translateY(-1px);
}
.sched-cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid #1a1a1a;
  position: relative; min-height: 28px;
}
.sched-cell:nth-child(odd of .sched-cell) {  }
.sched-cell.hour-start { border-bottom-color: #222; }
.sched-time-gutter.hour-start { border-bottom-color: #222; }
.sched-cell.today-col { background: #e8ff0004; }
.sched-block {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; padding: 3px 6px; font-size: 10px;
  font-weight: 700; overflow: hidden; z-index: 2;
  white-space: nowrap; text-overflow: ellipsis;
  pointer-events: none; line-height: 1.3;
}
.sched-block.gcal {
  background: #2a2a2a; border: 1px solid #333; color: #888;
}
.sched-block.canva-busy {
  background: #ff2d6b11; border: 1px solid #ff2d6b33; color: #ff2d6b99;
}
.sched-block.task-event {
  border: none; color: rgba(0,0,0,0.8);
}
.sched-block.suggestion {
  background: transparent; border: 2px dashed #e8ff00;
  color: #e8ff00; pointer-events: all; cursor: pointer;
  transition: background 0.1s;
}
.sched-block.suggestion:hover { background: #e8ff0015; }
#schedule-sidebar {
  width: 220px; min-width: 220px; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sched-tasks-label {
  padding: 14px 16px 8px; font-size: 9px; font-weight: 800;
  color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#sched-tasks-list {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.sched-task-chip {
  padding: 8px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.8);
  cursor: default; border: none; text-align: left;
  line-height: 1.3; overflow: hidden;
}
.sched-task-chip .chip-proj {
  font-size: 9px; font-weight: 800; opacity: 0.6;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 2px;
}
.sched-empty-tasks {
  font-size: 11px; color: var(--muted2); text-align: center;
  padding: 20px 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

/* Header */
#proj-header { padding: 28px 32px 20px; flex-shrink: 0; display: none; }
#proj-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  margin-bottom: 16px;
}
#proj-title-wrap { flex: 1; min-width: 0; }
#proj-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
#save-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #00ff88; opacity: 0; transition: opacity 0.3s;
}
#save-dot.show { opacity: 1; }
#proj-title {
  font-size: 36px; font-weight: 900; letter-spacing: -1.5px;
  line-height: 1; text-transform: uppercase; color: #f0f0ee;
}
#proj-header-actions {
  display: flex; align-items: center; gap: 8px; padding-top: 8px;
}
#view-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 3px; gap: 2px;
}
.vbtn {
  padding: 6px 14px; border-radius: 8px; border: none;
  background: none; cursor: pointer; font-size: 11.5px; font-weight: 700;
  color: var(--muted); transition: all 0.1s; font-family: inherit;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.vbtn.active { background: #222; color: var(--text); }
.vbtn:hover:not(.active) { color: #888; }
#add-task-btn {
  padding: 8px 18px; color: #0c0c0c; border: none;
  border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 800;
  font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
  flex-shrink: 0; transition: transform 0.1s, filter 0.1s;
  background: #e8ff00;
}
#add-task-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
#add-task-btn:active { transform: translateY(0); }

/* Stats row */
#proj-stats {
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid var(--border); padding-top: 16px;
}
.stat-pill {
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase; border: 1px solid var(--border);
  color: var(--muted); background: var(--surface);
}
.stat-pill.done    { color: #00ff88; border-color: #00ff8830; background: #00ff8810; }
.stat-pill.ongoing { color: #00d4ff; border-color: #00d4ff30; background: #00d4ff10; }
.stat-pill.inprog { color: #e8ff00; border-color: #e8ff0030; background: #e8ff0010; }
.stat-pill.todo  { color: #888; }

/* ── Content ── */
#content { flex: 1; overflow-y: auto; padding: 0 32px 40px; }

/* ── Cards view ── */
#cards-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px; align-items: start;
}

/* ── Task card (neon block) ── */
.task-card {
  border-radius: var(--r); padding: 18px 18px 16px;
  position: relative; overflow: hidden; min-height: 140px;
  display: flex; flex-direction: column; gap: 10px;
  transition: transform 0.12s, filter 0.12s; cursor: default;
  border: none;
}
.task-card:hover { transform: translateY(-2px); filter: brightness(1.04); }
.task-card:hover .del-btn { opacity: 1; }
.task-card.is-done { filter: brightness(0.55) saturate(0.5); }
.task-card.is-done:hover { filter: brightness(0.65) saturate(0.6); }

.card-top { display: flex; align-items: center; justify-content: space-between; }
.status-circle {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid rgba(0,0,0,0.25); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: rgba(0,0,0,0.5);
  transition: all 0.12s; flex-shrink: 0;
}
.status-circle:hover { background: rgba(0,0,0,0.12); }
.status-circle.done { background: rgba(0,0,0,0.2); border-color: rgba(0,0,0,0.3); color: rgba(0,0,0,0.7); }
.status-circle.in-progress { border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.6); }
.status-circle.ongoing { border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.6); border-style: dashed; }

.del-btn {
  background: rgba(0,0,0,0.15); border: none; color: rgba(0,0,0,0.4);
  cursor: pointer; opacity: 0; transition: all 0.12s;
  font-size: 11px; padding: 4px 6px; border-radius: 6px;
  position: absolute; top: 14px; right: 14px; z-index: 2;
}
.del-btn:hover { background: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }

.task-title {
  font-size: 18px; font-weight: 900; line-height: 1.15;
  letter-spacing: -0.5px; text-transform: uppercase;
  color: rgba(0,0,0,0.85); outline: none; flex: 1;
  padding-right: 8px;
}
.task-title[contenteditable="true"]:empty::before {
  content: 'TASK NAME…'; opacity: 0.35;
}

.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 6px; }
.card-note-count {
  font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.4);
  background: rgba(0,0,0,0.1); padding: 2px 7px; border-radius: 6px;
  letter-spacing: 0.3px; white-space: nowrap;
}
.task-card[draggable="true"] { cursor: grab; }
.task-card[draggable="true"]:active { cursor: grabbing; }
.task-card.dragging { opacity: 0.4; transform: scale(0.97); }
.due {
  font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.45);
  cursor: pointer; padding: 3px 7px; border-radius: 6px;
  background: rgba(0,0,0,0.1); display: inline-flex; align-items: center; gap: 4px;
  transition: background 0.1s; position: relative; text-transform: uppercase; letter-spacing: 0.3px;
}
.due:hover { background: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
.due.overdue { background: rgba(0,0,0,0.2); color: #ff2d6b; }
.due input[type="date"] {
  position: absolute; opacity: 0; pointer-events: none;
  width: 1px; height: 1px; top: 0; left: 0;
}

.task-notes {
  width: 100%; background: rgba(0,0,0,0.08); border: none; outline: none; resize: none;
  font-size: 11.5px; color: rgba(0,0,0,0.5); font-family: inherit;
  line-height: 1.5; border-radius: 8px; padding: 6px 8px;
  transition: background 0.1s;
}
.task-notes::placeholder { color: rgba(0,0,0,0.25); }
.task-notes:focus { background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.7); }

/* ── Kanban ── */
#kanban-view { display: flex; gap: 10px; align-items: flex-start; }
.k-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.k-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding: 0 2px;
}
.k-col-title {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.k-count {
  font-size: 10px; background: var(--surface); color: var(--muted);
  padding: 2px 7px; border-radius: 10px; font-weight: 700;
  border: 1px solid var(--border);
}
.k-cards {
  flex: 1; min-height: 80px; border-radius: 12px;
  transition: background 0.15s, outline 0.15s;
}
.k-cards.drag-over {
  background: rgba(255,255,255,0.04); outline: 2px dashed #333;
}
.k-add-btn {
  width: 100%; margin-top: 6px; background: none; border: 1px dashed #2a2a2a;
  border-radius: 10px; color: #444; cursor: pointer; font-family: inherit;
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 8px; transition: all 0.15s;
}
.k-add-btn:hover { border-color: #444; color: var(--muted); background: #161616; }
.k-cards { display: flex; flex-direction: column; gap: 8px; }
.k-empty {
  border: 1px dashed var(--border); border-radius: var(--r);
  padding: 24px; text-align: center; font-size: 11px;
  color: var(--muted2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── Timeline ── */
#timeline-view { max-width: 640px; }
.tl-group { margin-bottom: 32px; }
.tl-date {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
}
.tl-date::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.tl-date.tl-ongoing { color: #00d4ff; }

/* ── Project notes section ── */
.proj-notes-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
.proj-notes-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.proj-notes-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.proj-notes-head-right { display: flex; align-items: center; gap: 6px; }
.proj-notes-collapse-btn {
  background: none; border: none; color: #444; cursor: pointer; font-size: 11px;
  padding: 2px 6px; border-radius: 5px; transition: color 0.1s; font-weight: 800;
}
.proj-notes-collapse-btn:hover { color: #aaa; }
.add-proj-note-btn {
  display: flex; align-items: center; gap: 5px; background: #1a1a1a;
  border: 1px solid #2a2a2a; border-radius: 10px; cursor: pointer;
  padding: 5px 12px; color: var(--muted); font-family: inherit; font-size: 11px;
  font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.1s;
}
.add-proj-note-btn:hover { background: #222; color: var(--text); }
.proj-notes-list { display: flex; flex-direction: column; gap: 10px; }
.proj-notes-list.collapsed { display: none; }
.note-entry.minimized .note-toolbar,
.note-entry.minimized .note-body,
.note-entry.minimized .note-done-btn,
.note-entry.minimized .note-view-body { display: none; }
.note-min-btn {
  background: none; border: none; color: #444; cursor: pointer; font-size: 10px;
  padding: 3px 5px; border-radius: 5px; transition: color 0.1s; flex-shrink: 0;
  font-weight: 800;
}
.note-min-btn:hover { color: #aaa; }

}

#modal-notes-list { display: flex; flex-direction: column; gap: 10px; }
#modal-links-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid #1e1e1e; flex-shrink: 0; }
#modal-links-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
#modal-links-heading { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
#modal-add-link-btn {
  display: flex; align-items: center; gap: 5px; background: #1a1a1a;
  border: 1px solid #2a2a2a; border-radius: 10px; cursor: pointer;
  padding: 5px 12px; color: var(--muted); font-family: inherit; font-size: 11px;
  font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.1s;
}

#modal-links-list { display: flex; flex-direction: column; gap: 4px; }
.note-entry {

}
.note-entry-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px 0;
}

}

.note-del-btn {

.note-body {

}
.note-body:empty::before { content: 'Write something…'; color: #2e2e2e; pointer-events: none; }
.note-body:focus { color: #ccc; }
.note-body ul, .note-body ol { padding-left: 20px; margin: 4px 0; }
.note-body li { margin: 2px 0; }
.note-body p { margin: 0; min-height: 1.7em; }
#modal-time-row {

}
.date-range-field input[type="time"] {

  padding: 5px 10px; outline: none; cursor: pointer; transition: all 0.1s;
}
.date-range-field input[type="time"]:hover { border-color: #444; color: #bbb; }
.date-range-field input[type="time"]:focus { border-color: #555; color: #ccc; }
#cal-time-picker {

}
#cal-slots-label {

}

.cal-slot {

}

#cal-manual-row {

}

}
#cal-confirm-btn:hover { filter: brightness(1.1); }
#cal-btn {
  display: flex; align-items: center; gap: 6px;
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
  color: #888; font-family: inherit; font-size: 11px; font-weight: 800;

}

}

.note-view-body {

}
.note-view-body:empty { display: none; }
.note-view-body ul, .note-view-body ol { padding-left: 20px; margin: 4px 0; }
.note-view-body li { margin: 2px 0; }
.note-view-body p { margin: 0; min-height: 1.7em; }
.note-edit-btn {

.note-edit-btn:hover { color: #aaa; }
.note-entry.viewing .note-toolbar,
.note-entry.viewing .note-body,

/* ── Gantt ── */
#gantt-view { display: flex; flex-direction: column; gap: 0; min-width: 0; }
.gantt-axis {
  display: flex; position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--border);
  margin-left: 200px; height: 28px;
}
.gantt-axis-tick {
  position: absolute; display: flex; flex-direction: column; align-items: flex-start;
  pointer-events: none;
}
.gantt-axis-tick-label {
  font-size: 9px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding-top: 8px; white-space: nowrap;
}
.gantt-axis-tick-line {
  width: 1px; background: var(--border); height: 8px; margin-top: 2px;
}
.gantt-body { position: relative; }
.gantt-row {
  display: flex; align-items: center; min-height: 36px;
  border-bottom: 1px solid #1a1a1a; cursor: pointer;
  transition: background 0.1s;
}
.gantt-row:hover { background: #111; }
.gantt-row.is-done { opacity: 0.45; }
.gantt-row-label {
  width: 200px; min-width: 200px; padding: 0 12px;
  font-size: 11.5px; font-weight: 700; color: #888;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex-shrink: 0;
}
.gantt-row:hover .gantt-row-label { color: #ccc; }
.gantt-row-track {
  flex: 1; position: relative; height: 36px;
}
.gantt-bar {
  position: absolute; top: 7px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; padding: 0 8px; overflow: hidden;
  min-width: 6px; transition: filter 0.1s;
}
.gantt-bar:hover { filter: brightness(1.12); }
.gantt-bar.overdue { outline: 2px solid #ff2d6b88; }
.gantt-bar-label {
  font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.75);
  text-transform: uppercase; letter-spacing: 0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}
.gantt-today-line {
  position: absolute; top: 0; width: 2px; background: #ff2d6b;
  pointer-events: none; z-index: 5; opacity: 0.8;
}
.gantt-today-line::before {
  content: 'TODAY';
  position: absolute; top: 4px; left: 4px;
  font-size: 8px; font-weight: 800; color: #ff2d6b;
  letter-spacing: 0.5px; white-space: nowrap;
}
#gantt-filter {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0 0 16px 0;
}
.gantt-filter-chip {
  display: flex; align-items: center; gap: 6px;
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px;
  color: #555; font-family: inherit; font-size: 11px; font-weight: 700;
  padding: 4px 12px; cursor: pointer; transition: all 0.15s;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 180px;
}
.gantt-filter-chip:hover { border-color: #444; color: #888; }
.gantt-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gantt-proj-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 8px 4px 10px; margin-left: 200px;
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.2px; color: #555;
}
.gantt-proj-header-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gantt-nodate-section { margin-top: 24px; }
.gantt-nodate-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
}
.gantt-nodate-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.gantt-wrapper { position: relative; overflow: hidden; }
.gantt-grid-line {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: #1a1a1a; pointer-events: none;
}

/* ── Mobile ── */
#hamburger {
  background: none; border: none; color: var(--text);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
  line-height: 1; flex-shrink: 0;
}
#mobile-topbar {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 98;
  height: 50px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  align-items: center; padding: 0 12px;
  padding-top: env(safe-area-inset-top);
}
#hamburger {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
}
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 99;
}
#sidebar-overlay.open { display: block; }

@media (max-width: 700px) {
  body { overflow: hidden; }

  #mobile-topbar { display: flex; }
  #main { padding-top: 50px; }

  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    z-index: 100; transform: translateX(-100%);
    transition: transform 0.25s ease; width: 85vw; min-width: 260px; max-width: 320px;
    overflow-x: hidden; overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
  }
  #sidebar.open { transform: translateX(0); }
  #projects-list { flex: 0 0 auto; }

  /* ensure sidebar buttons are always reachable */
  #add-proj, #fb-auth-btn, #schedule-btn { flex-shrink: 0; }

  #main { width: 100%; }

  #proj-header {
    padding: 16px 16px 12px;
  }
  #proj-header-top {
    flex-direction: column; gap: 10px; align-items: stretch;
  }
  #proj-title { font-size: 26px; }
  #proj-eyebrow { align-items: center; }
  #proj-header-actions {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  #view-toggle { flex: 1; overflow-x: auto; }
  #view-toggle::-webkit-scrollbar { display: none; }
  #add-task-btn { flex-shrink: 0; }

  #content { padding: 0 12px 80px; }

  .task-card { touch-action: manipulation; min-height: 0 !important; }

  /* Cards view: single column */
  #cards-grid { grid-template-columns: 1fr !important; }

  /* Kanban: horizontal scroll */
  #kanban-view { overflow-x: auto !important; flex-wrap: nowrap !important; }
  .k-col { min-width: 240px; flex-shrink: 0; }

  /* Schedule header */

    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getDatabase, ref, set, onValue, off }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCQww0qrqo2vBJl9Vyd0LlZIRXqGwaXFHs",
    authDomain: "project-hub-d866d.firebaseapp.com",
    databaseURL: "https://project-hub-d866d-default-rtdb.firebaseio.com",
    projectId: "project-hub-d866d",
    storageBucket: "project-hub-d866d.firebasestorage.app",
    messagingSenderId: "86002357853",
    appId: "1:86002357853:web:9ff881e33e49de04ad9fb4"
  };

  if (!firebaseConfig) { console.warn('Firebase not configured yet.'); window.__fbReady = false; }
  else {
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);
    let dbUnsub = null;

    window.__fbReady = true;

    window.__fbSignIn = async () => {
      const provider = new GoogleAuthProvider();
      try { await signInWithPopup(auth, provider); }
      catch(e) { console.error('Sign-in failed', e); }
    };

    window.__fbSignOut = async () => {
      if (dbUnsub) { off(ref(db)); dbUnsub = null; }
      await signOut(auth);
    };

    onAuthStateChanged(auth, user => {
      const btn = document.getElementById('fb-auth-btn');
      const indicator = document.getElementById('fb-sync-indicator');
      if (user) {
        if (btn) { btn.textContent = 'Signed in as ' + (user.displayName || user.email); btn.title = 'Click to sign out'; btn.dataset.signed = '1'; }
        if (indicator) indicator.title = 'Synced to Firebase';
        // listen for remote changes
        const dataRef = ref(db, 'users/' + user.uid + '/data');
        dbUnsub = onValue(dataRef, snapshot => {
          const val = snapshot.val();
          if (val && val.projects) {
            // only apply if remote is newer or local is empty
            const remoteTs = val._ts || 0;
            const localTs  = window.__localTs || 0;
            if (remoteTs >= localTs) {
              window.__localTs = remoteTs;
              S.projects = val.projects;
              S.projects.forEach(p => { if (!p.category) p.category = 'work'; });
              if (!S.activeId || !S.projects.find(p => p.id === S.activeId))
                S.activeId = S.projects[0]?.id || null;
              render();
            }
          }
        });
        window.__fbSave = (data) => {
          const ts = Date.now();
          window.__localTs = ts;
          set(ref(db, 'users/' + user.uid + '/data'), { ...data, _ts: ts });
        };
      } else {
        if (btn) { btn.textContent = 'Sync to Cloud'; btn.title = 'Sign in with Google to sync across devices'; btn.dataset.signed = ''; }
        if (indicator) indicator.title = 'Not synced';
        if (dbUnsub) { off(ref(db)); dbUnsub = null; }
        window.__fbSave = null;
      }
    });
  }
</script>

let S = { projects: [], activeId: null, view: 'kanban' };
function uid() { return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,6); }

function load() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    S.projects = (stored ? JSON.parse(stored) : DEFAULT_DATA).projects || [];
  } catch { S.projects = DEFAULT_DATA.projects; }
  // migrate: ensure every project has a category
  S.projects.forEach(p => { if (!p.category) p.category = 'work'; });
  if (S.projects.length) S.activeId = S.projects[0].id;
}

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = { projects: S.projects };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if (window.__fbSave) window.__fbSave(data);
    const dot = document.getElementById('save-dot');
    dot.classList.add('show');
    setTimeout(() => dot.classList.remove('show'), 1200);
  }, 400);
}

const proj = () => S.projects.find(p => p.id === S.activeId);
const SN = { todo: 'in-progress', 'in-progress': 'ongoing', ongoing: 'done', done: 'todo' };

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}
function isOverdue(d, s) { return d && s !== 'done' && new Date(d) < new Date(new Date().toDateString()); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function statusIcon(status) {
  if (status === 'done')        return '✓';
  if (status === 'in-progress') return '◑';
  if (status === 'ongoing')     return '∞';
  return '';
}

function dueEl(task) {
  const ov = isOverdue(task.dueDate, task.status);
  const end = task.dateOngoing ? 'Ongoing' : (task.dueDate ? fmtDate(task.dueDate) : null);
  const label = task.startDate && end
    ? `${fmtDate(task.startDate)} → ${end}`
    : task.startDate ? `${fmtDate(task.startDate)} →`
    : end ? end
    : '+ Date';
  return `<span class="due${ov ? ' overdue' : ''}">${label}</span>`;
}

function noteCount(task) {
  const notes = Array.isArray(task.notes) ? task.notes : (task.notes ? [task.notes] : []);
  return notes.filter(n => (typeof n === 'object' ? n.body || n.title : n)).length;
}

function cardHtml(task, draggable = false) {
  const p = proj();
  const color = p?.color || '#e8ff00';
  const isDone = task.status === 'done';
  const nc = noteCount(task);
  return `<div class="task-card${isDone ? ' is-done' : ''}" data-tid="${task.id}" style="background:${color}" ${draggable ? 'draggable="true"' : ''}>
    <div class="card-top">
      <button class="status-circle ${task.status}" data-a="status">${statusIcon(task.status)}</button>
    </div>
    <button class="del-btn" data-a="del-task">✕</button>
    <div class="task-title" contenteditable="true" data-a="title" spellcheck="false">${esc(task.title)}</div>
    <div class="card-bottom">
      ${dueEl(task)}
      ${nc ? `<span class="card-note-count">◈ ${nc}</span>` : ''}
    </div>
  </div>`;
}

function cardsView(p) {
  if (!p.tasks.length)
    return `<div id="cards-view"><div class="empty-state"><div class="icon">✦</div><p>No tasks yet</p><small>Hit "+ Add Task" to get started</small></div></div>`;
  return `<div id="cards-view">${p.tasks.map(t => cardHtml(t)).join('')}</div>`;
}

function kanbanView(p) {
  const cols = [
    { key: 'todo',        label: 'To Do' },
    { key: 'in-progress', label: 'In Progress' },
    { key: 'ongoing',     label: 'Ongoing' },
    { key: 'done',        label: 'Done' }
  ];
  return `<div id="kanban-view">${cols.map(col => {
    const tasks = p.tasks.filter(t => t.status === col.key);
    return `<div class="k-col" data-col="${col.key}">
      <div class="k-col-head">
        <span class="k-col-title">${col.label}</span>
        <span class="k-count">${tasks.length}</span>
      </div>
      <div class="k-cards" data-col="${col.key}">${tasks.length
        ? tasks.map(t => cardHtml(t, true)).join('')
        : `<div class="k-empty">Drop here</div>`
      }</div>
      <button class="k-add-btn" data-a="k-add-task" data-status="${col.key}">＋ Add task</button>
    </div>`;
  }).join('')}</div>`;
}

function timelineView(p) {
  if (!p.tasks.length)
    return `<div id="timeline-view"><div class="empty-state"><div class="icon">↕</div><p>No tasks yet</p></div></div>`;
  const ongoingTasks = p.tasks.filter(t => t.status === 'ongoing');
  const rest = p.tasks.filter(t => t.status !== 'ongoing');
  const sorted = [...rest].sort((a,b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1; if (!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });
  const groups = {};
  sorted.forEach(t => { const k = t.dueDate || '__'; (groups[k] = groups[k] || []).push(t); });
  const ongoingSection = ongoingTasks.length ? `
    <div class="tl-group">
      <div class="tl-date tl-ongoing">∞ Ongoing</div>
      ${ongoingTasks.map(t => cardHtml(t)).join('')}
    </div>` : '';
  return `<div id="timeline-view">${ongoingSection}${Object.entries(groups).map(([k, tasks]) => `
    <div class="tl-group">
      <div class="tl-date">${k === '__' ? 'No Date' : fmtDate(k)}</div>
      ${tasks.map(t => cardHtml(t)).join('')}
    </div>
  `).join('')}</div>`;
}

let ganttSelectedIds = null; // null = all selected

function toggleGanttProject(pid) {
  console.log('toggleGanttProject called', pid, ganttSelectedIds);
  if (!ganttSelectedIds) ganttSelectedIds = new Set(S.projects.map(p => p.id));
  if (ganttSelectedIds.has(pid)) {
    if (ganttSelectedIds.size > 1) ganttSelectedIds.delete(pid);
  } else {
    ganttSelectedIds.add(pid);
  }
  console.log('after toggle', [...ganttSelectedIds]);
  renderMain();
}

function ganttView() {
  // always re-sync: add any new projects, remove deleted ones
  if (!ganttSelectedIds) {
    ganttSelectedIds = new Set(S.projects.map(p => p.id));
  } else {
    // only remove projects that no longer exist
    const validIds = new Set(S.projects.map(p => p.id));
    ganttSelectedIds.forEach(id => { if (!validIds.has(id)) ganttSelectedIds.delete(id); });
  }

  const selectedProjects = S.projects.filter(p => ganttSelectedIds.has(p.id));

  // project filter chips
  const filterBar = `<div id="gantt-filter">
    ${S.projects.map(p => {
      const on = ganttSelectedIds.has(p.id);
      return `<button class="gantt-filter-chip${on ? ' on' : ''}" data-gpid="${p.id}" onclick="toggleGanttProject('${p.id}')" style="${on ? `background:${p.color}22;border-color:${p.color};color:${p.color}` : ''}">
        <span class="gantt-chip-dot" style="background:${on ? p.color : '#444'}"></span>
        ${esc(p.name)}
      </button>`;
    }).join('')}
  </div>`;

  // collect all dated tasks across selected projects
  const allDated = [];
  const allUndated = [];
  selectedProjects.forEach(p => {
    p.tasks.forEach(t => {
      if (t.startDate || t.dueDate || t.dateOngoing) allDated.push({ task: t, proj: p });
      else allUndated.push({ task: t, proj: p });
    });
  });

  if (!allDated.length && !allUndated.length) {
    return `<div id="gantt-view">${filterBar}<div class="empty-state"><div class="icon">▬</div><p>No tasks in selected projects</p></div></div>`;
  }

  if (!allDated.length) {
    return `<div id="gantt-view">${filterBar}<div class="gantt-nodate-section"><div class="gantt-nodate-label">No Date</div>${allUndated.map(({task}) => cardHtml(task)).join('')}</div></div>`;
  }

  const today = new Date(new Date().toDateString());
  const PADDING_DAYS = 3;

  let minDate = new Date(today), maxDate = new Date(today.getTime() + 14 * 86400000);
  allDated.forEach(({task: t}) => {
    if (t.startDate) { const d = new Date(t.startDate + 'T00:00:00'); if (d < minDate) minDate = d; }
    if (t.dueDate)   { const d = new Date(t.dueDate   + 'T00:00:00'); if (d > maxDate) maxDate = d; }
  });
  minDate = new Date(minDate.getTime() - PADDING_DAYS * 86400000);
  maxDate = new Date(maxDate.getTime() + PADDING_DAYS * 86400000);
  const totalDays = Math.round((maxDate - minDate) / 86400000) + 1;

  function dayOffset(dateStr) {
    return Math.round((new Date(dateStr + 'T00:00:00') - minDate) / 86400000);
  }

  const tickInterval = totalDays > 60 ? 14 : totalDays > 30 ? 7 : totalDays > 14 ? 3 : 1;
  let axisTicks = '', gridLines = '';
  for (let i = 0; i < totalDays; i += tickInterval) {
    const d = new Date(minDate.getTime() + i * 86400000);
    const label = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    const pct = (i / totalDays) * 100;
    axisTicks += `<div class="gantt-axis-tick" style="left:${pct}%"><span class="gantt-axis-tick-label">${label}</span><div class="gantt-axis-tick-line"></div></div>`;
    gridLines  += `<div class="gantt-grid-line" style="left:${pct}%"></div>`;
  }

  const todayOff = Math.round((today - minDate) / 86400000);
  const todayLine = (todayOff >= 0 && todayOff <= totalDays)
    ? `<div class="gantt-today-line" style="left:${(todayOff/totalDays)*100}%;height:100%"></div>` : '';

  // group rows by project
  let rows = '';
  selectedProjects.forEach(p => {
    const dated = p.tasks.filter(t => t.startDate || t.dueDate || t.dateOngoing);
    if (!dated.length) return;
    rows += `<div class="gantt-proj-header" style="border-left:3px solid ${p.color}">
      <span class="gantt-proj-header-dot" style="background:${p.color}"></span>${esc(p.name)}
    </div>`;
    dated.forEach(t => {
      const isDone = t.status === 'done';
      const ov = isOverdue(t.dueDate, t.status);
      let startOff, endOff;
      if (t.startDate && t.dueDate)       { startOff = dayOffset(t.startDate); endOff = dayOffset(t.dueDate); }
      else if (t.startDate && t.dateOngoing) { startOff = dayOffset(t.startDate); endOff = totalDays - 1; }
      else if (t.startDate)               { startOff = dayOffset(t.startDate); endOff = startOff; }
      else if (t.dueDate && t.dateOngoing){ startOff = dayOffset(t.dueDate);   endOff = totalDays - 1; }
      else                                { startOff = dayOffset(t.dueDate);   endOff = startOff; }
      const leftPct  = (startOff / totalDays) * 100;
      const widthPct = Math.max(((endOff - startOff + 1) / totalDays) * 100, 0.5);
      rows += `<div class="gantt-row${isDone ? ' is-done' : ''}" data-tid="${t.id}" data-gprojid="${p.id}">
        <div class="gantt-row-label" title="${esc(t.title)}">${esc(t.title)}</div>
        <div class="gantt-row-track">
          <div class="gantt-bar${ov ? ' overdue' : ''}" style="left:${leftPct}%;width:${widthPct}%;background:${p.color}" title="${esc(t.title)}">
            <span class="gantt-bar-label">${esc(t.title)}</span>
          </div>
        </div>
      </div>`;
    });
  });

  const undatedSection = allUndated.length ? `<div class="gantt-nodate-section"><div class="gantt-nodate-label">No Date</div>${allUndated.map(({task,proj: p}) => `<div style="opacity:0.6;font-size:12px;padding:4px 0 4px 8px;border-left:3px solid ${p.color};margin:4px 0;color:#aaa">${esc(task.title)}</div>`).join('')}</div>` : '';

  return `<div id="gantt-view">
    ${filterBar}
    <div style="position:relative">
      <div class="gantt-axis" style="position:relative;height:28px;margin-left:200px">${axisTicks}</div>
      <div class="gantt-wrapper gantt-body">${gridLines}${todayLine}${rows}</div>
    </div>
    ${undatedSection}
  </div>`;
}

function initSidebarDnd() {
  let dragId = null;
  let dragCategory = null;

  function clearIndicators() {
    document.querySelectorAll('.proj-item').forEach(i => {
      i.classList.remove('drop-before', 'drop-after');
    });
  }

  function getPosition(el, clientY) {
    const rect = el.getBoundingClientRect();
    return clientY < rect.top + rect.height / 2 ? 'before' : 'after';
  }

  document.querySelectorAll('.proj-item[draggable]').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.pid;
      dragCategory = el.dataset.category;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('dragging'), 0);
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      clearIndicators();
      dragId = null; dragCategory = null;
    });

    el.addEventListener('dragover', e => {
      e.preventDefault();
      if (el.dataset.pid === dragId) return;
      // only allow drop within same category
      if (el.dataset.category !== dragCategory) return;
      clearIndicators();
      const pos = getPosition(el, e.clientY);
      el.classList.add(pos === 'before' ? 'drop-before' : 'drop-after');
    });

    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) clearIndicators();
    });

    el.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragId || el.dataset.pid === dragId) { clearIndicators(); return; }
      if (el.dataset.category !== dragCategory) { clearIndicators(); return; }
      const pos = getPosition(el, e.clientY);
      clearIndicators();
      const from = S.projects.findIndex(p => p.id === dragId);
      let to = S.projects.findIndex(p => p.id === el.dataset.pid);
      if (from < 0 || to < 0) return;
      const [moved] = S.projects.splice(from, 1);
      to = S.projects.findIndex(p => p.id === el.dataset.pid);
      S.projects.splice(pos === 'after' ? to + 1 : to, 0, moved);
      save(); renderSidebar();
    });
  });
}

function initKanbanDnd() {
  if (S.view !== 'kanban') return;
  let dragId = null;

  document.querySelectorAll('.task-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.tid;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.k-cards').forEach(c => c.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.k-cards').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!dragId) return;
      const p = proj(); if (!p) return;
      const task = p.tasks.find(t => t.id === dragId);
      if (task) { task.status = col.dataset.col; save(); renderMain(); }
      dragId = null;
    });
  });
}

function renderMain() {
  const p = proj();
  const header = document.getElementById('proj-header');
  const content = document.getElementById('content');

  if (!p) {
    header.style.display = 'none';
    content.innerHTML = `<div id="no-project"><div class="big">Select<br>a Project</div><p>← Choose from the sidebar</p></div>`;
    return;
  }

  header.style.display = 'block';
  document.getElementById('proj-title').textContent = p.name;
  document.getElementById('add-task-btn').style.background = p.color;

  const done    = p.tasks.filter(t => t.status === 'done').length;
  const ip      = p.tasks.filter(t => t.status === 'in-progress').length;
  const ongoing = p.tasks.filter(t => t.status === 'ongoing').length;
  const todo    = p.tasks.filter(t => t.status === 'todo').length;
  document.getElementById('proj-stats').innerHTML = [
    todo    ? `<span class="stat-pill todo">${todo} To Do</span>` : '',
    ip      ? `<span class="stat-pill inprog">${ip} In Progress</span>` : '',
    ongoing ? `<span class="stat-pill ongoing">${ongoing} Ongoing</span>` : '',
    done    ? `<span class="stat-pill done">${done} Done</span>` : '',
    !p.tasks.length ? `<span class="stat-pill">No tasks yet</span>` : ''
  ].filter(Boolean).join('');

  document.querySelectorAll('.vbtn').forEach(b => b.classList.toggle('active', b.dataset.view === S.view));

  let html = '';
  if (S.view === 'cards')    html = cardsView(p);
  if (S.view === 'kanban')   html = kanbanView(p);
  if (S.view === 'timeline') html = timelineView(p);
  if (S.view === 'gantt')    html = ganttView();
  if (S.view !== 'gantt') html += projNotesSection(p) + linksSection(p);
  content.innerHTML = html;
  initKanbanDnd();
  content.querySelectorAll('textarea').forEach(ta => {
    ta.style.height = ta.scrollHeight + 'px';
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
  });
}

document.getElementById('content').addEventListener('input', e => {
  const p = proj(); if (!p) return;
  const bodyEl = e.target.closest('[data-pnbody]');
  if (bodyEl) {
    const n = p.notesList?.find(n => n.id === bodyEl.dataset.pnbody);
    if (n) { n.body = bodyEl.innerHTML; save(); }
  }
  const titleEl = e.target.closest('[data-pntitle]');
  if (titleEl) {
    const n = p.notesList?.find(n => n.id === titleEl.dataset.pntitle);
    if (n) { n.title = titleEl.value; save(); }
  }
}, true);

document.getElementById('content').addEventListener('click', e => {
  const p = proj(); if (!p) return;

  // Add note
  if (e.target.closest('[data-a="add-proj-note"]')) {
    migrateProjectNotes(p);
    const newNote = { id: uid(), title: '', body: '' };
    projNotesEditing.add(newNote.id);
    p.notesList.push(newNote);
    save(); renderMain();
    setTimeout(() => {
      const entries = document.querySelectorAll('[data-pnid]');
      entries[entries.length - 1]?.querySelector('.note-entry-title')?.focus();
    }, 30);
    return;
  }

  // Collapse section
  if (e.target.closest('[data-a="collapse-proj-notes"]')) {
    if (projNotesCollapsed.has(p.id)) projNotesCollapsed.delete(p.id);
    else projNotesCollapsed.add(p.id);
    renderMain(); return;
  }

  // Minimize note
  const minBtn = e.target.closest('[data-pnmin]');
  if (minBtn) {
    const id = minBtn.dataset.pnmin;
    if (projNotesMinimized.has(id)) projNotesMinimized.delete(id);
    else projNotesMinimized.add(id);
    renderMain(); return;
  }

  // Delete note
  const delBtn = e.target.closest('[data-pndel]');
  if (delBtn) {
    const id = delBtn.dataset.pndel;
    projNotesEditing.delete(id); projNotesMinimized.delete(id);
    p.notesList = p.notesList.filter(n => n.id !== id);
    save(); renderMain(); return;
  }

  // Done (switch to view mode)
  const doneBtn = e.target.closest('[data-pndone]');
  if (doneBtn) {
    projNotesEditing.delete(doneBtn.dataset.pndone);
    renderMain(); return;
  }

  // Edit (switch to edit mode)
  const editBtn = e.target.closest('[data-pnedit]');
  if (editBtn) {
    projNotesEditing.add(editBtn.dataset.pnedit);
    renderMain();
    setTimeout(() => {
      const entry = document.querySelector(`[data-pnid="${editBtn.dataset.pnedit}"]`);
      entry?.querySelector('.note-body')?.focus();
    }, 30);
    return;
  }

  // Toolbar commands
  const toolBtn = e.target.closest('[data-pncmd]');
  if (toolBtn) {
    e.preventDefault();
    const nid = toolBtn.dataset.pncid;
    const bodyEl = document.querySelector(`[data-pnbody="${nid}"]`);
    if (bodyEl) { bodyEl.focus(); document.execCommand(toolBtn.dataset.pncmd, false, null); }
    return;
  }
});

const GCAL_CLIENT_ID = '701306796206-sjefkqa9ti4pdnjc2qkoclnffh0h6duu.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly';
let gcalToken = null;

function gcalSignIn() {
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (resp) => {
        if (resp.error) { reject(resp); return; }
        gcalToken = resp.access_token;
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

const TZ = 'Asia/Manila';

function nextDay(d) {
  const dt = new Date(d + 'T00:00:00');
  dt.setDate(dt.getDate() + 1);
  return dt.toISOString().split('T')[0];
}

function fmtTime(h, m) {
  const ap = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ap}`;
}

async function createCalendarEvent(startDate, endDate, startTime, endTime) {
  const t = getModalTask(); if (!t) return;
  const p = proj(); if (!p) return;
  const token = gcalToken || await gcalSignIn();

  let eventStart, eventEnd;
  if (startTime) {
    eventStart = { dateTime: `${startDate}T${startTime}:00`, timeZone: TZ };
    eventEnd = endTime
      ? { dateTime: `${endDate}T${endTime}:00`, timeZone: TZ }
      : { dateTime: `${endDate}T${startTime}:00`, timeZone: TZ };
  } else {
    eventStart = { date: startDate };
    eventEnd = { date: nextDay(endDate) };
  }

  const event = {
    summary: t.title || 'Task',
    description: `Project: ${p.name}\n\nAdded from Project Hub`,
    start: eventStart, end: eventEnd,
    attendees: [{ email: 'ej@canva.com' }],
    colorId: '3', visibility: 'private',
    reminders: { useDefault: true }
  };

  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?sendUpdates=all', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(event)
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'Failed'); }
}

async function addToCalendar() {
  const t = getModalTask(); if (!t) return;
  const btn = document.getElementById('cal-btn');
  const picker = document.getElementById('cal-time-picker');

  // If picker already open, just toggle it closed
  if (picker.style.display !== 'none') {
    picker.style.display = 'none';
    return;
  }

  if (!t.startDate && !t.dueDate && !t.dateOngoing) {
    alert('Please set at least a start or end date on the task first.');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = 'Checking calendar…';

  try {
    const token = gcalToken || await gcalSignIn();
    const refDate = t.startDate || t.dueDate;
    const dayStart = new Date(refDate + 'T00:00:00+08:00');
    const dayEnd   = new Date(refDate + 'T23:59:59+08:00');

    // Fetch free/busy for that day
    const fbRes = await fetch('https://www.googleapis.com/calendar/v3/freeBusy', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ timeMin: dayStart.toISOString(), timeMax: dayEnd.toISOString(),
        items: [{ id: 'primary' }, { id: 'ej@canva.com' }] })
    });
    const fbData = fbRes.ok ? await fbRes.json() : { calendars: {} };
    const busy = [
      ...(fbData.calendars?.primary?.busy || []),
      ...(fbData.calendars?.['ej@canva.com']?.busy || [])
    ].map(b => ({ start: new Date(b.start), end: new Date(b.end) }));

    // Find free 30-min slots between 7am–5pm
    const slots = [];
    for (let h = 7; h < 17; h++) {
      for (let m = 0; m < 60; m += 30) {
        const s = new Date(refDate + 'T00:00:00+08:00'); s.setHours(h, m, 0, 0);
        const e = new Date(s); e.setMinutes(e.getMinutes() + 30);
        if (!busy.some(b => b.start < e && b.end > s)) {
          slots.push({ h, m });
          if (slots.length >= 5) break;
        }
      }
      if (slots.length >= 5) break;
    }

    // Render picker
    const slotsEl = document.getElementById('cal-slots');
    slotsEl.innerHTML = slots.length
      ? slots.map(s => `<button class="cal-slot" data-h="${s.h}" data-m="${s.m}">${fmtTime(s.h, s.m)}</button>`).join('')
      : '<span style="color:#555;font-size:11px">No free slots found</span>';

    document.getElementById('modal-start-time').value = '';
    document.getElementById('modal-end-time').value = '';
    picker.style.display = 'flex';

  } catch (err) {
    console.error(err);
    alert('Could not check calendar: ' + (err.message || err));
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Add to Calendar`;
  }
}

const GCAL_SCOPE_READONLY = 'https://www.googleapis.com/auth/calendar.readonly';

S.scheduleView = false;
S.scheduleWeekOffset = 0;

// suggestions: array of { taskId, projId, date (YYYY-MM-DD), hour, minute, durationMins }
let schedSuggestions = [];
// busy blocks fetched from gcal: array of { start: Date, end: Date, isCanva: bool }
let schedBusyBlocks = [];
// confirmed task events on calendar this week: array of { title, color, start: Date, end: Date }
let schedTaskEvents = [];

function getWeekBounds(offset) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23,59,59,999);
  return { mon, sun };
}

function fmtWeekLabel(mon, sun) {
  const opts = { day: 'numeric', month: 'short' };
  return `${mon.toLocaleDateString('en-AU', opts)} – ${sun.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })}`;
}

function isoDate(d) {
  return d.toISOString().split('T')[0];
}

function getUnscheduledTasks() {
  const { mon, sun } = getWeekBounds(S.scheduleWeekOffset);
  const results = [];
  S.projects.forEach(p => {
    p.tasks.forEach(t => {
      if (t.status === 'done') return;
      const hasDue = t.dueDate && !t.dateOngoing;
      const hasStart = t.startDate;
      if (!hasDue && !hasStart) {
        results.push({ task: t, proj: p });
      } else if (hasDue) {
        const d = new Date(t.dueDate + 'T00:00:00');
        if (d >= mon && d <= sun) results.push({ task: t, proj: p });
      }
    });
  });
  return results;
}

function renderScheduleView() {
  if (!S.scheduleView) return;
  const { mon, sun } = getWeekBounds(S.scheduleWeekOffset);
  document.getElementById('schedule-week-label').textContent = `Week of ${fmtWeekLabel(mon, sun)}`;

  const today = new Date(); today.setHours(0,0,0,0);
  const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const START_HOUR = 8, END_HOUR = 19; // 8am–7pm
  const SLOT_MINS = 30;
  const SLOTS_PER_HOUR = 60 / SLOT_MINS;
  const totalSlots = (END_HOUR - START_HOUR) * SLOTS_PER_HOUR;

  // Build day dates array Mon–Sun
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i); d.setHours(0,0,0,0);
    days.push(d);
  }

  // Grid: header row + slot rows
  let html = '';

  // Corner cell
  html += `<div class="sched-day-header" style="border-right:1px solid var(--border)"></div>`;

  // Day headers
  days.forEach((d, i) => {
    const isToday = d.getTime() === today.getTime();
    html += `<div class="sched-day-header${isToday ? ' today' : ''}">
      <div class="sched-day-name">${DAYS[i]}</div>
      <div class="sched-day-date">${d.getDate()} ${d.toLocaleDateString('en-AU',{month:'short'}).toUpperCase()}</div>
    </div>`;
  });

  // Time slot rows
  for (let s = 0; s < totalSlots; s++) {
    const totalMins = (START_HOUR * 60) + s * SLOT_MINS;
    const h = Math.floor(totalMins / 60);
    const m = totalMins % 60;
    const isHourStart = m === 0;
    const label = isHourStart ? (h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`) : '';

    html += `<div class="sched-time-gutter${isHourStart ? ' hour-start' : ''}">
      <span class="sched-time-label">${label}</span>
    </div>`;

    days.forEach((d, di) => {
      const isToday = d.getTime() === today.getTime();
      const slotStart = new Date(d); slotStart.setHours(h, m, 0, 0);
      const slotEnd = new Date(slotStart); slotEnd.setMinutes(slotEnd.getMinutes() + SLOT_MINS);

      // Collect blocks for this cell
      let blocksHtml = '';

      // Busy blocks (gcal events + canva free/busy)
      schedBusyBlocks.forEach(b => {
        if (b.start >= slotEnd || b.end <= slotStart) return;
        // Overlap — render block
        const overlapStart = b.start > slotStart ? b.start : slotStart;
        const overlapEnd = b.end < slotEnd ? b.end : slotEnd;
        const topPct = ((overlapStart - slotStart) / (SLOT_MINS * 60000)) * 100;
        const heightPct = ((overlapEnd - overlapStart) / (SLOT_MINS * 60000)) * 100;
        const cls = b.isCanva ? 'canva-busy' : 'gcal';
        const title = b.title ? esc(b.title) : (b.isCanva ? 'Canva busy' : 'Busy');
        blocksHtml += `<div class="sched-block ${cls}" style="top:${topPct}%;height:${heightPct}%" title="${title}">${title}</div>`;
      });

      // Task events (confirmed on calendar)
      schedTaskEvents.forEach(ev => {
        if (ev.start >= slotEnd || ev.end <= slotStart) return;
        const overlapStart = ev.start > slotStart ? ev.start : slotStart;
        const overlapEnd = ev.end < slotEnd ? ev.end : slotEnd;
        const topPct = ((overlapStart - slotStart) / (SLOT_MINS * 60000)) * 100;
        const heightPct = ((overlapEnd - overlapStart) / (SLOT_MINS * 60000)) * 100;
        blocksHtml += `<div class="sched-block task-event" style="top:${topPct}%;height:${heightPct}%;background:${ev.color}" title="${esc(ev.title)}">${esc(ev.title)}</div>`;
      });

      // Suggestions
      schedSuggestions.forEach((sg, idx) => {
        const sgStart = new Date(sg.date + 'T00:00:00');
        sgStart.setHours(sg.hour, sg.minute, 0, 0);
        const sgEnd = new Date(sgStart); sgEnd.setMinutes(sgEnd.getMinutes() + sg.durationMins);
        if (isoDate(sgStart) !== isoDate(d)) return;
        if (sgStart >= slotEnd || sgEnd <= slotStart) return;
        const overlapStart = sgStart > slotStart ? sgStart : slotStart;
        const overlapEnd = sgEnd < slotEnd ? sgEnd : slotEnd;
        const topPct = ((overlapStart - slotStart) / (SLOT_MINS * 60000)) * 100;
        const heightPct = ((overlapEnd - overlapStart) / (SLOT_MINS * 60000)) * 100;
        const p = S.projects.find(p => p.id === sg.projId);
        const t = p?.tasks.find(t => t.id === sg.taskId);
        blocksHtml += `<div class="sched-block suggestion" style="top:${topPct}%;height:${heightPct}%" data-sg="${idx}" title="Click to schedule: ${esc(t?.title||'')}">✦ ${esc(t?.title||'Task')}</div>`;
      });

      html += `<div class="sched-cell${isToday ? ' today-col' : ''}${isHourStart ? ' hour-start' : ''}" style="height:28px">${blocksHtml}</div>`;
    });
  }

  document.getElementById('schedule-grid').innerHTML = html;

  // Unscheduled tasks sidebar
  const unscheduled = getUnscheduledTasks();
  const tasksList = document.getElementById('sched-tasks-list');
  if (!unscheduled.length) {
    tasksList.innerHTML = `<div class="sched-empty-tasks">All tasks scheduled ✓</div>`;
  } else {
    tasksList.innerHTML = unscheduled.map(({ task, proj: p }) =>
      `<div class="sched-task-chip" style="background:${p.color}">
        <div class="chip-proj">${esc(p.name)}</div>
        ${esc(task.title || 'Untitled')}
      </div>`
    ).join('');
  }

  // Attach suggestion click handlers
  document.querySelectorAll('[data-sg]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.sg);
      const sg = schedSuggestions[idx];
      if (!sg) return;
      await confirmSuggestion(sg, idx);
    });
  });
}

async function confirmSuggestion(sg, idx) {
  const p = S.projects.find(p => p.id === sg.projId);
  const t = p?.tasks.find(t => t.id === sg.taskId);
  if (!p || !t) return;

  const startDate = sg.date;
  const h = sg.hour, m = sg.minute;
  const endH = Math.floor((h * 60 + m + sg.durationMins) / 60);
  const endM = (h * 60 + m + sg.durationMins) % 60;
  const pad = n => String(n).padStart(2,'0');
  const TZ = 'Asia/Manila';

  const event = {
    summary: t.title || 'Task',
    description: `Project: ${p.name}\n\nScheduled from Project Hub`,
    start: { dateTime: `${startDate}T${pad(h)}:${pad(m)}:00`, timeZone: TZ },
    end:   { dateTime: `${startDate}T${pad(endH)}:${pad(endM)}:00`, timeZone: TZ },
    colorId: '3',
    visibility: 'private',
    reminders: { useDefault: true }
  };

  try {
    const token = gcalToken || await gcalSignIn();
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?sendUpdates=all', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(event)
    });
    if (!res.ok) throw new Error((await res.json()).error?.message || 'Failed');

    // Update task dates
    t.startDate = startDate;
    t.dueDate = startDate;
    t.startTime = `${pad(h)}:${pad(m)}`;
    t.endTime = `${pad(endH)}:${pad(endM)}`;
    save();

    // Move suggestion to confirmed
    const evStart = new Date(`${startDate}T${pad(h)}:${pad(m)}:00`);
    const evEnd   = new Date(`${startDate}T${pad(endH)}:${pad(endM)}:00`);
    schedTaskEvents.push({ title: t.title, color: p.color, start: evStart, end: evEnd });
    schedSuggestions.splice(idx, 1);
    renderScheduleView();
  } catch(err) {
    alert('Could not create event: ' + (err.message || err));
  }
}

async function findFreeSlots() {
  const btn = document.getElementById('sched-find-btn');
  btn.classList.add('loading');
  btn.textContent = 'Finding…';

  try {
    const token = gcalToken || await gcalSignIn();
    const { mon, sun } = getWeekBounds(S.scheduleWeekOffset);
    const timeMin = mon.toISOString();
    const timeMax = sun.toISOString();

    // Fetch regular events
    const evRes = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&maxResults=250`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!evRes.ok) throw new Error('Failed to fetch events');
    const evData = await evRes.json();

    // Fetch free/busy
    const fbRes = await fetch('https://www.googleapis.com/calendar/v3/freeBusy', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ timeMin, timeMax, items: [{ id: 'primary' }, { id: 'ej@canva.com' }] })
    });
    if (!fbRes.ok) throw new Error('Failed to fetch free/busy');
    const fbData = await fbRes.json();

    // Build busy blocks list
    schedBusyBlocks = [];

    // From events (for display)
    (evData.items || []).forEach(ev => {
      if (ev.status === 'cancelled') return;
      const s = ev.start?.dateTime ? new Date(ev.start.dateTime) : null;
      const e = ev.end?.dateTime   ? new Date(ev.end.dateTime)   : null;
      if (!s || !e) return;
      schedBusyBlocks.push({ start: s, end: e, isCanva: false, title: ev.summary || 'Busy' });
    });

    // From freeBusy for ej@canva.com (secondary calendar)
    const canvaBusy = fbData.calendars?.['ej@canva.com']?.busy || [];
    canvaBusy.forEach(b => {
      schedBusyBlocks.push({ start: new Date(b.start), end: new Date(b.end), isCanva: true, title: 'Canva busy' });
    });

    // Now find suggestions
    const unscheduled = getUnscheduledTasks();
    schedSuggestions = [];

    const PREF_START = 7, PREF_END = 17; // 7am–5pm preferred
    const SLOT_MINS = 30;

    // Build a set of busy intervals per day
    function isBusy(start, end) {
      return schedBusyBlocks.some(b => b.start < end && b.end > start);
    }
    function isSuggested(start, end) {
      return schedSuggestions.some(sg => {
        const s2 = new Date(sg.date + 'T00:00:00');
        s2.setHours(sg.hour, sg.minute, 0, 0);
        const e2 = new Date(s2); e2.setMinutes(e2.getMinutes() + sg.durationMins);
        return s2 < end && e2 > start;
      });
    }

    // Days to try: Mon–Fri preferred, then Sat–Sun
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      days.push(d);
    }
    // Sort: weekdays first
    const sorted = [...days.slice(0,5), ...days.slice(5)];

    outer:
    for (const { task, proj: p } of unscheduled) {
      for (const day of sorted) {
        // Try preferred hours first, then expand
        const ranges = [[PREF_START, PREF_END], [7, 17]];
        for (const [rStart, rEnd] of ranges) {
          for (let h = rStart; h < rEnd; h++) {
            for (let m = 0; m < 60; m += SLOT_MINS) {
              const slotStart = new Date(day); slotStart.setHours(h, m, 0, 0);
              const slotEnd = new Date(slotStart); slotEnd.setMinutes(slotEnd.getMinutes() + SLOT_MINS);
              if (!isBusy(slotStart, slotEnd) && !isSuggested(slotStart, slotEnd)) {
                schedSuggestions.push({
                  taskId: task.id, projId: p.id,
                  date: isoDate(slotStart),
                  hour: h, minute: m, durationMins: SLOT_MINS
                });
                continue outer;
              }
            }
          }
        }
      }
    }

    renderScheduleView();
  } catch(err) {
    alert('Could not fetch calendar: ' + (err.message || err));
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '✦ Find Free Slots';
  }
}

function showScheduleView() {
  S.scheduleView = true;
  document.getElementById('proj-header').style.display = 'none';
  document.getElementById('proj-notes-wrap').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  document.getElementById('schedule-view').classList.add('active');
  document.getElementById('schedule-btn').classList.add('active');
  // Clear suggestions & busy when switching weeks
  schedSuggestions = [];
  schedBusyBlocks = [];
  schedTaskEvents = [];
  renderScheduleView();
  // Auto-fetch calendar data
  findFreeSlots();
}

function hideScheduleView() {
  S.scheduleView = false;
  document.getElementById('schedule-view').classList.remove('active');
  document.getElementById('schedule-btn').classList.remove('active');
  document.getElementById('content').style.display = '';
  renderMain();
}

document.getElementById('schedule-btn').addEventListener('click', () => {
  if (S.scheduleView) hideScheduleView();
  else showScheduleView();
});

document.getElementById('sched-prev').addEventListener('click', () => {
  S.scheduleWeekOffset--;
  schedSuggestions = []; schedBusyBlocks = []; schedTaskEvents = [];
  renderScheduleView(); findFreeSlots();
});
document.getElementById('sched-next').addEventListener('click', () => {
  S.scheduleWeekOffset++;
  schedSuggestions = []; schedBusyBlocks = []; schedTaskEvents = [];
  renderScheduleView(); findFreeSlots();
});
document.getElementById('sched-today-btn').addEventListener('click', () => {
  S.scheduleWeekOffset = 0;
  schedSuggestions = []; schedBusyBlocks = []; schedTaskEvents = [];
  renderScheduleView(); findFreeSlots();
});
document.getElementById('sched-find-btn').addEventListener('click', findFreeSlots);
</script>
